<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Targets - Display / Print</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5; color: #333; padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 10px; font-size: 1.5em; }
    .instructions {
      text-align: center; color: #666; margin-bottom: 30px;
      font-size: 0.9em; line-height: 1.6;
    }
    .targets { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
    .target-card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px; text-align: center;
    }
    .target-card img {
      max-width: 100%; height: auto; border: 2px solid #eee; border-radius: 4px;
    }
    .target-card h3 { margin: 12px 0 4px; font-size: 1.1em; }
    .target-card p { color: #888; font-size: 0.85em; }
    .print-btn {
      display: inline-block; margin-top: 20px; padding: 10px 24px;
      background: #2196F3; color: #fff; border: none; border-radius: 8px;
      font-size: 1em; cursor: pointer;
    }
    .print-btn:hover { background: #1976D2; }
    @media print {
      body { background: #fff; padding: 0; }
      .instructions, .print-btn { display: none; }
      .target-card {
        box-shadow: none; page-break-inside: avoid;
        border: 1px solid #ccc; margin: 10px auto;
      }
    }
  </style>
</head>
<body>

  <h1>Image Target - Display / Print</h1>
  <div class="instructions">
    このページをモニターに表示するか印刷して、AR端末のカメラで映してください。<br>
    ターゲット画像が認識されると、3DコンテンツがAR表示されます。
  </div>

  <div class="targets">
    <div class="target-card">
      <img src="./image-targets/sample-target-1_original.jpg" alt="Sample Target 1">
      <h3>Target 1: sample-target-1</h3>
      <p>認識すると回転する3Dボックスが表示されます</p>
    </div>
    <div class="target-card">
      <img src="./image-targets/sample-target-2_original.jpg" alt="Sample Target 2">
      <h3>Target 2: sample-target-2</h3>
      <p>認識すると情報パネルが表示されます</p>
    </div>
  </div>

  <div style="text-align: center; margin-top: 30px;">
    <button class="print-btn" onclick="window.print()">印刷する</button>
  </div>

</body>
</html>
