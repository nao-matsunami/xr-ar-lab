<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Gesture Manipulation AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: 14px;
      font-family: sans-serif; pointer-events: none; text-align: center;
      line-height: 1.6; max-width: 90%; transition: opacity 0.5s;
    }
    #gesture-hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .hint-tag {
      background: rgba(0,0,0,0.5); color: #fff; padding: 8px 14px;
      border-radius: 20px; font-size: 13px; font-family: sans-serif;
      border: 1px solid rgba(255,255,255,0.3);
      min-height: 44px; display: flex; align-items: center;
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Gesture</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> 地面をタップしてオブジェクト配置</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>1本指ドラッグで移動</li>
        <li>ピンチで拡大/縮小</li>
        <li>2本指で回転</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="instructions">地面をタップして砂の城を配置</div>
  <div id="gesture-hint" style="display:none;">
    <span class="hint-tag">1本指ドラッグ: 移動</span>
    <span class="hint-tag">ピンチ: 拡大/縮小</span>
    <span class="hint-tag">2本指回転: 回転</span>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    shadow="type: pcfsoft; autoUpdate: true"
    xrweb="allowedDevices: any">

    <a-assets>
      <a-asset-item id="castleModel" src="./assets/sand-castle.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="0.4"></a-light>
    <a-light type="directional" intensity="0.8" position="1 4 2"
      light="castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048;
             shadowCameraTop: 10; shadowCameraBottom: -10;
             shadowCameraRight: 10; shadowCameraLeft: -10"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>
  </a-scene>

  <script>
    // === Native Touch Gesture System ===
    // No xrextras gesture components — handle everything with raw touch events

    const MIN_SCALE = 0.2;
    const MAX_SCALE = 5.0;

    let placed = false;
    let targetObj = null;

    // Touch state
    let touches = {};
    let lastPinchDist = null;
    let lastRotateAngle = null;
    let activeTouchCount = 0;

    // Place object on ground tap
    document.getElementById('ground').addEventListener('click', function(event) {
      if (placed) return;
      if (activeTouchCount >= 2) return;
      placed = true;

      var point = event.detail.intersection.point;

      var castle = document.createElement('a-entity');
      castle.setAttribute('id', 'target-object');
      castle.setAttribute('class', 'cantap');
      castle.setAttribute('position', point);
      castle.setAttribute('gltf-model', '#castleModel');
      castle.setAttribute('scale', '0.001 0.001 0.001');
      castle.setAttribute('shadow', 'cast: true; receive: false');

      // Appear animation
      castle.setAttribute('animation', {
        property: 'scale',
        to: '1 1 1',
        easing: 'easeOutElastic',
        dur: 1000
      });

      document.querySelector('a-scene').appendChild(castle);
      targetObj = castle;

      // Update UI
      document.getElementById('instructions').textContent = 'ジェスチャーで操作してください';
      document.getElementById('gesture-hint').style.display = 'flex';

      setTimeout(function() {
        document.getElementById('instructions').style.opacity = '0';
      }, 3000);
    });

    // === Touch event handlers ===
    document.addEventListener('touchstart', function(e) {
      activeTouchCount = e.touches.length;
      for (var i = 0; i < e.touches.length; i++) {
        var t = e.touches[i];
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      lastPinchDist = null;
      lastRotateAngle = null;
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!targetObj) return;
      e.preventDefault();

      var touchList = e.touches;
      activeTouchCount = touchList.length;

      if (touchList.length === 1) {
        // 1-finger drag: move object
        var t = touchList[0];
        var prev = touches[t.identifier];
        if (prev) {
          var dx = (t.clientX - prev.x) * 0.01;
          var dz = (t.clientY - prev.y) * 0.01;
          var pos = targetObj.getAttribute('position');
          targetObj.setAttribute('position', {
            x: pos.x + dx,
            y: pos.y,
            z: pos.z + dz
          });
        }
        touches[t.identifier] = { x: t.clientX, y: t.clientY };

      } else if (touchList.length === 2) {
        // 2-finger: pinch scale + rotate
        var t1 = touchList[0];
        var t2 = touchList[1];
        var dx = t2.clientX - t1.clientX;
        var dy = t2.clientY - t1.clientY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var angle = Math.atan2(dy, dx);

        // Pinch → scale
        if (lastPinchDist !== null) {
          var scaleDelta = dist / lastPinchDist;
          var currentScale = targetObj.getAttribute('scale');
          var newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, currentScale.x * scaleDelta));
          targetObj.setAttribute('scale', {x: newScale, y: newScale, z: newScale});
        }

        // Rotate
        if (lastRotateAngle !== null) {
          var angleDelta = (angle - lastRotateAngle) * (180 / Math.PI);
          var currentRot = targetObj.getAttribute('rotation');
          targetObj.setAttribute('rotation', {
            x: currentRot.x,
            y: currentRot.y + angleDelta,
            z: currentRot.z
          });
        }

        lastPinchDist = dist;
        lastRotateAngle = angle;
        touches[t1.identifier] = { x: t1.clientX, y: t1.clientY };
        touches[t2.identifier] = { x: t2.clientX, y: t2.clientY };
      }
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        delete touches[e.changedTouches[i].identifier];
      }
      activeTouchCount = e.touches.length;
      if (e.touches.length < 2) {
        lastPinchDist = null;
        lastRotateAngle = null;
      }
    }, { passive: true });

    document.addEventListener('touchcancel', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        delete touches[e.changedTouches[i].identifier];
      }
      activeTouchCount = e.touches.length;
      lastPinchDist = null;
      lastRotateAngle = null;
    }, { passive: true });

  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
