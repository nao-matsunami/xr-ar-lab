<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Target - Display / Print</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5; color: #333; padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 10px; font-size: 1.5em; }
    .instructions {
      text-align: center; color: #666; margin-bottom: 30px;
      font-size: 0.9em; line-height: 1.6;
    }
    .target-card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px;
      margin: 0 auto; text-align: center;
    }
    .target-card canvas {
      border: 2px solid #eee; border-radius: 4px;
      display: block; margin: 0 auto;
    }
    .target-card h3 { margin: 12px 0 4px; font-size: 1.1em; }
    .target-card p { color: #888; font-size: 0.85em; line-height: 1.5; }
    .btn-row {
      text-align: center; margin-top: 24px; display: flex; gap: 12px;
      justify-content: center; flex-wrap: wrap;
    }
    .btn {
      display: inline-block; padding: 10px 24px;
      border: none; border-radius: 8px; font-size: 1em; cursor: pointer;
    }
    .btn-print { background: #2196F3; color: #fff; }
    .btn-print:hover { background: #1976D2; }
    .btn-back { background: #eee; color: #333; text-decoration: none; }
    .btn-back:hover { background: #ddd; }
    @media print {
      body { background: #fff; padding: 0; }
      .instructions, .btn-row { display: none; }
      .target-card {
        box-shadow: none; page-break-inside: avoid;
        border: 1px solid #ccc; margin: 10px auto;
      }
    }
  </style>
</head>
<body>

  <h1>Canvas Target - Display / Print</h1>
  <div class="instructions">
    この画像をモニターに表示するか印刷して、<br>
    AR端末のカメラで映してください。<br>
    ターゲット画像が認識されると、動的テクスチャがAR表示されます。
  </div>

  <div class="target-card">
    <canvas id="target-canvas" width="300" height="300"></canvas>
    <h3>canvas-target</h3>
    <p>このパターンをカメラに映すと<br>Canvas動的テクスチャが表示されます</p>
  </div>

  <div class="btn-row">
    <button class="btn btn-print" onclick="window.print()">印刷する</button>
    <a class="btn btn-back" href="./index.html">ARデモに戻る</a>
  </div>

  <script>
    // Generate a high-contrast, feature-rich target pattern
    (function() {
      var c = document.getElementById('target-canvas');
      var ctx = c.getContext('2d');
      var W = 300;

      // White background
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, W);

      // Seeded pseudo-random for reproducibility
      var seed = 12345;
      function rand() {
        seed = (seed * 16807 + 0) % 2147483647;
        return seed / 2147483647;
      }

      // Border
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, W - 4, W - 4);

      // Corner position markers (asymmetric for orientation)
      ctx.fillStyle = '#000';
      // Top-left: large square
      ctx.fillRect(10, 10, 50, 50);
      ctx.fillStyle = '#fff';
      ctx.fillRect(18, 18, 34, 34);
      ctx.fillStyle = '#000';
      ctx.fillRect(24, 24, 22, 22);

      // Top-right: large square
      ctx.fillStyle = '#000';
      ctx.fillRect(240, 10, 50, 50);
      ctx.fillStyle = '#fff';
      ctx.fillRect(248, 18, 34, 34);
      ctx.fillStyle = '#000';
      ctx.fillRect(254, 24, 22, 22);

      // Bottom-left: large square
      ctx.fillStyle = '#000';
      ctx.fillRect(10, 240, 50, 50);
      ctx.fillStyle = '#fff';
      ctx.fillRect(18, 248, 34, 34);
      ctx.fillStyle = '#000';
      ctx.fillRect(24, 254, 22, 22);

      // Bottom-right: smaller marker (asymmetry for orientation)
      ctx.fillStyle = '#000';
      ctx.fillRect(255, 255, 35, 35);
      ctx.fillStyle = '#fff';
      ctx.fillRect(261, 261, 23, 23);
      ctx.fillStyle = '#000';
      ctx.fillRect(267, 267, 11, 11);

      // Random data cells (QR-code style)
      var grid = 20;
      var cell = (W - 20) / grid;
      ctx.fillStyle = '#000';
      for (var y = 0; y < grid; y++) {
        for (var x = 0; x < grid; x++) {
          // Skip corner marker areas
          if (x < 4 && y < 4) continue;
          if (x > 15 && y < 4) continue;
          if (x < 4 && y > 15) continue;
          if (x > 16 && y > 16) continue;

          if (rand() > 0.55) {
            ctx.fillRect(10 + x * cell + 1, 10 + y * cell + 1, cell - 2, cell - 2);
          }
        }
      }

      // Center label
      ctx.fillStyle = '#ff4400';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('CANVAS', W / 2, W / 2 - 8);
      ctx.fillText('TARGET', W / 2, W / 2 + 10);

      // Timing pattern (horizontal line between top markers)
      ctx.fillStyle = '#000';
      for (var tx = 60; tx < 240; tx += 14) {
        if (Math.floor((tx - 60) / 14) % 2 === 0) {
          ctx.fillRect(tx, 30, 7, 7);
        }
      }
      // Timing pattern (vertical)
      for (var ty = 60; ty < 240; ty += 14) {
        if (Math.floor((ty - 60) / 14) % 2 === 0) {
          ctx.fillRect(30, ty, 7, 7);
        }
      }
    })();
  </script>

</body>
</html>
