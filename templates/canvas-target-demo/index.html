<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Canvas Target AR Demo</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none; text-align: center;
    }
    #canvas-buttons {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #canvas-buttons button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    #canvas-buttons button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #preview-canvas {
      position: fixed; top: 70px; right: 10px; z-index: 999;
      width: 80px; height: 80px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="info">画像ターゲットにかざしてください<br><small>Canvas動的テクスチャ</small></div>
  <canvas id="preview-canvas" width="256" height="256"></canvas>
  <div id="canvas-buttons">
    <button class="active" onclick="setPattern('gradient')">🌈 グラデ</button>
    <button onclick="setPattern('clock')">⏰ 時計</button>
    <button onclick="setPattern('wave')">🌊 ウェーブ</button>
    <button onclick="setPattern('matrix')">💻 Matrix</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any; disableWorldTracking: true">

    <a-camera id="camera" position="0 4 4"></a-camera>
    <a-light type="ambient" intensity="1"></a-light>

    <xrextras-named-image-target name="canvas-target">
      <a-plane id="canvas-plane" width="0.8" height="0.8"
        position="0 0 0.01" rotation="0 0 0"
        material="shader: flat; transparent: true; opacity: 0.95"
        animation="property: scale; from: 0.01 0.01 0.01; to: 1 1 1; dur: 500; easing: easeOutElastic">
      </a-plane>
    </xrextras-named-image-target>
  </a-scene>

  <script>
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    let currentPattern = 'gradient';
    let frame = 0;
    let canvasTexture = null;
    let planeMesh = null;

    function setPattern(name) {
      currentPattern = name;
      document.querySelectorAll('#canvas-buttons button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
    window.setPattern = setPattern;

    function drawGradient(t) {
      const grad = ctx.createLinearGradient(0, 0, 256, 256);
      const hue1 = (t * 50) % 360;
      const hue2 = (hue1 + 120) % 360;
      const hue3 = (hue1 + 240) % 360;
      grad.addColorStop(0, `hsl(${hue1}, 100%, 50%)`);
      grad.addColorStop(0.5, `hsl(${hue2}, 100%, 50%)`);
      grad.addColorStop(1, `hsl(${hue3}, 100%, 50%)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);
    }

    function drawClock(t) {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, 256, 256);
      const cx = 128, cy = 128, r = 100;

      // Face
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Hour markers
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * 85, cy + Math.sin(a) * 85);
        ctx.lineTo(cx + Math.cos(a) * 95, cy + Math.sin(a) * 95);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      const now = new Date();
      const sec = now.getSeconds() + now.getMilliseconds() / 1000;
      const min = now.getMinutes() + sec / 60;
      const hr = (now.getHours() % 12) + min / 60;

      // Hour hand
      const ha = (hr / 12) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(ha) * 50, cy + Math.sin(ha) * 50);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Minute hand
      const ma = (min / 60) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(ma) * 70, cy + Math.sin(ma) * 70);
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Second hand
      const sa = (sec / 60) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(sa) * 80, cy + Math.sin(sa) * 80);
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Digital
      ctx.fillStyle = '#00f0ff';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(now.toLocaleTimeString('ja-JP'), cx, cy + 40);
    }

    function drawWave(t) {
      ctx.fillStyle = '#0a1628';
      ctx.fillRect(0, 0, 256, 256);
      for (let layer = 0; layer < 5; layer++) {
        ctx.beginPath();
        const hue = (t * 30 + layer * 60) % 360;
        ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${0.8 - layer * 0.15})`;
        ctx.lineWidth = 3;
        for (let x = 0; x <= 256; x++) {
          const y = 128 + Math.sin((x / 40) + t * 2 + layer) * (30 - layer * 4)
            + Math.sin((x / 20) + t * 3 + layer * 2) * 15;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function drawMatrix(t) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, 256, 256);
      ctx.fillStyle = '#00ff41';
      ctx.font = '14px monospace';
      const chars = 'アイウエオカキクケコ0123456789ABCDEF';
      if (Math.random() > 0.3) {
        for (let col = 0; col < 16; col++) {
          if (Math.random() > 0.85) {
            const ch = chars[Math.floor(Math.random() * chars.length)];
            const row = Math.floor(Math.random() * 18);
            ctx.globalAlpha = 0.5 + Math.random() * 0.5;
            ctx.fillText(ch, col * 16, row * 14 + 14);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    // Animation loop
    function animate() {
      frame++;
      const t = frame / 60;

      switch (currentPattern) {
        case 'gradient': drawGradient(t); break;
        case 'clock': drawClock(t); break;
        case 'wave': drawWave(t); break;
        case 'matrix': drawMatrix(t); break;
      }

      // Update Three.js texture
      if (!planeMesh) {
        const planeEl = document.getElementById('canvas-plane');
        if (planeEl && planeEl.getObject3D('mesh')) {
          planeMesh = planeEl.getObject3D('mesh');
          canvasTexture = new THREE.CanvasTexture(canvas);
          planeMesh.material = new THREE.MeshBasicMaterial({
            map: canvasTexture,
            transparent: true,
            opacity: 0.95
          });
        }
      }
      if (canvasTexture) {
        canvasTexture.needsUpdate = true;
      }

      requestAnimationFrame(animate);
    }

    // Init matrix with black background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 256, 256);
    animate();
  </script>
</body>
</html>
