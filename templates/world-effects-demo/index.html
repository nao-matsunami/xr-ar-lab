<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>World Effects AR Demo</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
    }
    #effect-buttons {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #effect-buttons button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    #effect-buttons button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
  </style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>
  <div id="info">地面をタップしてエフェクトを配置</div>
  <div id="effect-buttons">
    <button class="active" onclick="setEffect('rain')">🌧️ 雨</button>
    <button onclick="setEffect('snow')">❄️ 雪</button>
    <button onclick="setEffect('fire')">🔥 炎</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.5" position="1 4 2"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>

    <!-- Particle container (placed on tap) -->
    <a-entity id="particles-container"></a-entity>
  </a-scene>

  <script>
    let currentEffect = 'rain';
    let placed = false;
    let particleInterval = null;
    let particles = [];
    const MAX_PARTICLES = 80;

    function setEffect(name) {
      currentEffect = name;
      document.querySelectorAll('#effect-buttons button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // Clear existing particles
      clearParticles();
    }
    window.setEffect = setEffect;

    function clearParticles() {
      particles.forEach(p => { if (p.parentNode) p.parentNode.removeChild(p); });
      particles = [];
    }

    function getParticleConfig() {
      switch (currentEffect) {
        case 'rain':
          return {
            color: '#4FC3F7',
            size: { w: 0.005, h: 0.04 },
            shape: 'box',
            speed: 0.06,
            spread: 1.5,
            startY: 2.5,
            gravity: true
          };
        case 'snow':
          return {
            color: '#FFFFFF',
            size: { r: 0.015 },
            shape: 'sphere',
            speed: 0.01,
            spread: 2,
            startY: 2.5,
            gravity: false
          };
        case 'fire':
          return {
            colors: ['#FF4500', '#FF6347', '#FFD700', '#FF8C00'],
            size: { r: 0.03 },
            shape: 'sphere',
            speed: 0.03,
            spread: 0.3,
            startY: 0,
            gravity: false,
            goUp: true
          };
        default:
          return null;
      }
    }

    function spawnParticle(origin) {
      const cfg = getParticleConfig();
      if (!cfg) return;

      if (particles.length >= MAX_PARTICLES) {
        const old = particles.shift();
        if (old.parentNode) old.parentNode.removeChild(old);
      }

      const el = document.createElement('a-entity');
      const ox = origin.x + (Math.random() - 0.5) * cfg.spread;
      const oy = origin.y + cfg.startY;
      const oz = origin.z + (Math.random() - 0.5) * cfg.spread;

      const color = cfg.colors ? cfg.colors[Math.floor(Math.random() * cfg.colors.length)] : cfg.color;

      if (cfg.shape === 'box') {
        el.setAttribute('geometry', `primitive: box; width: ${cfg.size.w}; height: ${cfg.size.h}; depth: ${cfg.size.w}`);
      } else {
        el.setAttribute('geometry', `primitive: sphere; radius: ${cfg.size.r}`);
      }

      el.setAttribute('material', `color: ${color}; shader: flat; opacity: 0.8; transparent: true`);
      el.setAttribute('position', `${ox} ${oy} ${oz}`);

      const targetY = cfg.goUp ? oy + 2 : origin.y;
      const dur = cfg.goUp ? 1500 + Math.random() * 1000 : (2000 / cfg.speed) + Math.random() * 500;

      el.setAttribute('animation', {
        property: 'position',
        to: `${ox + (Math.random() - 0.5) * 0.3} ${targetY} ${oz + (Math.random() - 0.5) * 0.3}`,
        dur: dur,
        easing: cfg.gravity ? 'easeInQuad' : 'linear'
      });

      el.setAttribute('animation__fade', {
        property: 'material.opacity',
        from: 0.8,
        to: 0,
        dur: dur,
        easing: 'easeInQuad'
      });

      if (cfg.goUp) {
        el.setAttribute('animation__scale', {
          property: 'scale',
          from: '1 1 1',
          to: '0.1 0.1 0.1',
          dur: dur
        });
      }

      document.getElementById('particles-container').appendChild(el);
      particles.push(el);

      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
        const idx = particles.indexOf(el);
        if (idx > -1) particles.splice(idx, 1);
      }, dur + 100);
    }

    // Place effect on ground tap
    let effectOrigin = null;
    document.getElementById('ground').addEventListener('click', (event) => {
      const point = event.detail.intersection.point;
      effectOrigin = { x: point.x, y: point.y, z: point.z };

      if (!placed) {
        placed = true;
        document.getElementById('info').textContent = 'エフェクトを切り替えてください';
        setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 3000);
      }

      // Restart particles from new position
      clearParticles();
      if (particleInterval) clearInterval(particleInterval);
      particleInterval = setInterval(() => {
        if (effectOrigin) {
          for (let i = 0; i < 3; i++) spawnParticle(effectOrigin);
        }
      }, 100);
    });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>
</body>
</html>
