<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Alpha Video AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: none; gap: 8px;
    }
    #controls button {
      padding: 10px 18px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #controls button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
  </style>
</head>
<body>

  <div id="instructions">地面をタップして透過動画プレーンを配置</div>
  <div id="controls">
    <button class="active" onclick="setVideoMode('gradient')">グラデーション</button>
    <button onclick="setVideoMode('pulse')">パルス</button>
    <button onclick="setVideoMode('wave')">ウェーブ</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" intensity="0.5" position="0 4 2"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>

  </a-scene>

  <script>
    // Since we don't have a real chromakey video asset,
    // this demo uses a canvas-based animated texture to demonstrate
    // the transparent video concept. In production, replace with
    // actual video + chromakey material.

    let videoPlane = null;
    let canvas, ctx, texture;
    let animMode = 'gradient';
    let animFrame = 0;

    function createAnimatedTexture() {
      canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      ctx = canvas.getContext('2d');
      texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function updateTexture() {
      animFrame++;
      ctx.clearRect(0, 0, 512, 512);

      if (animMode === 'gradient') {
        // Rotating gradient circle (simulates holographic projection)
        const t = animFrame * 0.02;
        const cx = 256, cy = 256;
        const grad = ctx.createRadialGradient(cx, cy, 20, cx, cy, 200);
        const hue1 = (animFrame * 2) % 360;
        const hue2 = (hue1 + 120) % 360;
        grad.addColorStop(0, `hsla(${hue1}, 100%, 60%, 0.9)`);
        grad.addColorStop(0.5, `hsla(${hue2}, 100%, 50%, 0.6)`);
        grad.addColorStop(1, `hsla(${hue1}, 100%, 40%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, 220, 0, Math.PI * 2);
        ctx.fill();

        // Inner spinning shape
        ctx.save();
        ctx.translate(256, 256);
        ctx.rotate(t);
        ctx.strokeStyle = `hsla(${hue2}, 100%, 70%, 0.8)`;
        ctx.lineWidth = 3;
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI * 2 / 6) * i;
          const r = 80 + Math.sin(t * 2 + i) * 20;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          ctx.stroke();
        }
        ctx.restore();

      } else if (animMode === 'pulse') {
        // Pulsing rings
        const t = animFrame * 0.03;
        for (let i = 0; i < 5; i++) {
          const r = ((t * 80 + i * 50) % 250);
          const alpha = 1 - r / 250;
          const hue = (animFrame + i * 60) % 360;
          ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha * 0.8})`;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(256, 256, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        // Center dot
        ctx.fillStyle = `hsla(${animFrame % 360}, 100%, 70%, 0.9)`;
        ctx.beginPath();
        ctx.arc(256, 256, 15, 0, Math.PI * 2);
        ctx.fill();

      } else if (animMode === 'wave') {
        // Wave pattern
        const t = animFrame * 0.04;
        for (let y = 0; y < 512; y += 8) {
          const hue = (y / 512 * 360 + animFrame * 3) % 360;
          const offset = Math.sin(y * 0.02 + t) * 100;
          const alpha = 0.3 + Math.sin(y * 0.01 + t * 0.5) * 0.3;
          ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
          ctx.fillRect(156 + offset, y, 200, 6);
        }
      }

      texture.needsUpdate = true;
      requestAnimationFrame(updateTexture);
    }

    function setVideoMode(mode) {
      animMode = mode;
      document.querySelectorAll('#controls button').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(
          mode === 'gradient' ? 'グラデーション' :
          mode === 'pulse' ? 'パルス' : 'ウェーブ'
        ));
      });
      // Simpler: just set active by index
      const btns = document.querySelectorAll('#controls button');
      btns.forEach(b => b.classList.remove('active'));
      if (mode === 'gradient') btns[0].classList.add('active');
      else if (mode === 'pulse') btns[1].classList.add('active');
      else btns[2].classList.add('active');
    }
    window.setVideoMode = setVideoMode;

    // Place video plane on tap
    let placed = false;
    document.getElementById('ground').addEventListener('click', (event) => {
      if (placed) return;
      placed = true;

      const point = event.detail.intersection.point;
      const tex = createAnimatedTexture();

      // Create plane entity
      videoPlane = document.createElement('a-entity');
      videoPlane.setAttribute('position', `${point.x} ${point.y + 1} ${point.z}`);

      // Use setAttribute for geometry
      videoPlane.setAttribute('geometry', 'primitive: plane; width: 1.5; height: 1.5');

      document.querySelector('a-scene').appendChild(videoPlane);

      // Wait for entity to initialize, then apply Three.js material
      videoPlane.addEventListener('loaded', () => {
        const mesh = videoPlane.getObject3D('mesh');
        if (mesh) {
          mesh.material = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
        }
      });

      // Billboard: always face camera
      const camera = document.getElementById('camera');
      setInterval(() => {
        if (videoPlane && videoPlane.object3D && camera && camera.object3D) {
          const camPos = camera.object3D.position;
          videoPlane.object3D.lookAt(camPos.x, videoPlane.object3D.position.y, camPos.z);
        }
      }, 30);

      // Start animation
      updateTexture();

      // Show controls
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('instructions').textContent = 'エフェクトを選択';
      setTimeout(() => {
        document.getElementById('instructions').style.opacity = '0';
      }, 3000);
    });
  </script>
</body>
</html>
