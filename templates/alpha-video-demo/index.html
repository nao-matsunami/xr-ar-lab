<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Alpha Video AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../lib/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: none; gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #controls button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #controls button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Alpha Video</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> カメラを起動するだけ</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>透過動画をAR空間に表示</li>
        <li>クロマキー合成の体験</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="instructions">地面をタップして透過動画プレーンを配置</div>
  <div id="controls">
    <button class="active" onclick="setVideoMode('gradient')">グラデーション</button>
    <button onclick="setVideoMode('pulse')">パルス</button>
    <button onclick="setVideoMode('wave')">ウェーブ</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" intensity="0.5" position="0 4 2"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>

  </a-scene>

  <script>
    // Since we don't have a real chromakey video asset,
    // this demo uses a canvas-based animated texture to demonstrate
    // the transparent video concept. In production, replace with
    // actual video + chromakey material.

    let videoPlane = null;
    let canvas, ctx, texture;
    let animMode = 'gradient';
    let animFrame = 0;

    function createAnimatedTexture() {
      canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      ctx = canvas.getContext('2d');
      texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function updateTexture() {
      animFrame++;
      ctx.clearRect(0, 0, 512, 512);

      if (animMode === 'gradient') {
        // Rotating gradient circle (simulates holographic projection)
        const t = animFrame * 0.02;
        const cx = 256, cy = 256;
        const grad = ctx.createRadialGradient(cx, cy, 20, cx, cy, 200);
        const hue1 = (animFrame * 2) % 360;
        const hue2 = (hue1 + 120) % 360;
        grad.addColorStop(0, `hsla(${hue1}, 100%, 60%, 0.9)`);
        grad.addColorStop(0.5, `hsla(${hue2}, 100%, 50%, 0.6)`);
        grad.addColorStop(1, `hsla(${hue1}, 100%, 40%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, 220, 0, Math.PI * 2);
        ctx.fill();

        // Inner spinning shape
        ctx.save();
        ctx.translate(256, 256);
        ctx.rotate(t);
        ctx.strokeStyle = `hsla(${hue2}, 100%, 70%, 0.8)`;
        ctx.lineWidth = 3;
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI * 2 / 6) * i;
          const r = 80 + Math.sin(t * 2 + i) * 20;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          ctx.stroke();
        }
        ctx.restore();

      } else if (animMode === 'pulse') {
        // Pulsing rings
        const t = animFrame * 0.03;
        for (let i = 0; i < 5; i++) {
          const r = ((t * 80 + i * 50) % 250);
          const alpha = 1 - r / 250;
          const hue = (animFrame + i * 60) % 360;
          ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha * 0.8})`;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(256, 256, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        // Center dot
        ctx.fillStyle = `hsla(${animFrame % 360}, 100%, 70%, 0.9)`;
        ctx.beginPath();
        ctx.arc(256, 256, 15, 0, Math.PI * 2);
        ctx.fill();

      } else if (animMode === 'wave') {
        // Wave pattern
        const t = animFrame * 0.04;
        for (let y = 0; y < 512; y += 8) {
          const hue = (y / 512 * 360 + animFrame * 3) % 360;
          const offset = Math.sin(y * 0.02 + t) * 100;
          const alpha = 0.3 + Math.sin(y * 0.01 + t * 0.5) * 0.3;
          ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
          ctx.fillRect(156 + offset, y, 200, 6);
        }
      }

      texture.needsUpdate = true;
      requestAnimationFrame(updateTexture);
    }

    function setVideoMode(mode) {
      animMode = mode;
      document.querySelectorAll('#controls button').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(
          mode === 'gradient' ? 'グラデーション' :
          mode === 'pulse' ? 'パルス' : 'ウェーブ'
        ));
      });
      // Simpler: just set active by index
      const btns = document.querySelectorAll('#controls button');
      btns.forEach(b => b.classList.remove('active'));
      if (mode === 'gradient') btns[0].classList.add('active');
      else if (mode === 'pulse') btns[1].classList.add('active');
      else btns[2].classList.add('active');
    }
    window.setVideoMode = setVideoMode;

    // Place video plane on tap
    let placed = false;
    document.getElementById('ground').addEventListener('click', (event) => {
      if (placed) return;
      placed = true;

      const point = event.detail.intersection.point;
      const tex = createAnimatedTexture();

      // Create plane entity
      videoPlane = document.createElement('a-entity');
      videoPlane.setAttribute('position', `${point.x} ${point.y + 1} ${point.z}`);

      // Use setAttribute for geometry
      videoPlane.setAttribute('geometry', 'primitive: plane; width: 1.5; height: 1.5');

      document.querySelector('a-scene').appendChild(videoPlane);

      // Wait for entity to initialize, then apply Three.js material
      videoPlane.addEventListener('loaded', () => {
        const mesh = videoPlane.getObject3D('mesh');
        if (mesh) {
          mesh.material = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
        }
      });

      // Billboard: always face camera
      const camera = document.getElementById('camera');
      setInterval(() => {
        if (videoPlane && videoPlane.object3D && camera && camera.object3D) {
          const camPos = camera.object3D.position;
          videoPlane.object3D.lookAt(camPos.x, videoPlane.object3D.position.y, camPos.z);
        }
      }, 30);

      // Start animation
      updateTexture();

      // Show controls
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('instructions').textContent = 'エフェクトを選択';
      setTimeout(() => {
        document.getElementById('instructions').style.opacity = '0';
      }, 3000);
    });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
