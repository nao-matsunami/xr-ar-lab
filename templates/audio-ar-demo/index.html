<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Audio AR Demo</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../lib/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none; text-align: center;
      line-height: 1.5;
    }
    #start-btn {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 14px 28px; border: 2px solid #00f0ff;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      border-radius: 25px; background: rgba(0,240,255,0.15);
      color: #00f0ff; font-size: 15px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #audio-info {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: none; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .audio-tag {
      padding: 8px 14px; border-radius: 12px; font-size: 12px;
      font-family: monospace; font-weight: 600;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Spatial Audio</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> 地面を検出してカメラを動かす</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>空間オーディオ体験</li>
        <li>音源に近づくと音が大きくなる</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>
  <div id="info">地面をタップしてオーディオソースを配置<br><small>カメラを向けると音が大きくなります</small></div>
  <button id="start-btn" onclick="startAudio()">🔊 オーディオ開始</button>
  <div id="audio-info">
    <span class="audio-tag" style="color:#E74C3C;">● 低音 220Hz</span>
    <span class="audio-tag" style="color:#3498DB;">● 中音 880Hz</span>
    <span class="audio-tag" style="color:#2ECC71;">● 高音 2200Hz</span>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.5" position="1 4 2"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"></a-entity>
  </a-scene>

  <script>
    let audioCtx = null;
    let audioStarted = false;
    let sources = [];

    const SOURCE_DEFS = [
      { freq: 220, type: 'sawtooth', color: '#E74C3C', label: '低音 220Hz', offset: { x: 0, z: -2 } },
      { freq: 880, type: 'square', color: '#3498DB', label: '中音 880Hz', offset: { x: 1.8, z: 1 } },
      { freq: 2200, type: 'sine', color: '#2ECC71', label: '高音 2200Hz', offset: { x: -1.8, z: 1 } },
    ];

    function startAudio() {
      if (audioStarted) return;
      audioStarted = true;

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('audio-info').style.display = 'flex';
    }

    let placed = false;
    document.getElementById('ground').addEventListener('click', (event) => {
      if (!audioStarted || placed) return;
      placed = true;

      const point = event.detail.intersection.point;
      const scene = document.querySelector('a-scene');

      SOURCE_DEFS.forEach((def, i) => {
        const x = point.x + def.offset.x;
        const y = point.y + 0.3;
        const z = point.z + def.offset.z;

        // Visual marker
        const marker = document.createElement('a-entity');
        marker.setAttribute('position', `${x} ${y} ${z}`);

        const sphere = document.createElement('a-sphere');
        sphere.setAttribute('radius', '0.2');
        sphere.setAttribute('color', def.color);
        sphere.setAttribute('material', 'shader: flat; opacity: 0.8; transparent: true');
        sphere.setAttribute('animation', {
          property: 'scale',
          dir: 'alternate',
          dur: 600 + i * 100,
          easing: 'easeInOutSine',
          loop: true,
          from: '1 1 1',
          to: '1.5 1.5 1.5'
        });
        marker.appendChild(sphere);

        // Pulse ring
        const ring = document.createElement('a-torus');
        ring.setAttribute('radius', '0.25');
        ring.setAttribute('radius-tubular', '0.01');
        ring.setAttribute('color', def.color);
        ring.setAttribute('material', 'shader: flat; opacity: 0.4; transparent: true');
        ring.setAttribute('rotation', '90 0 0');
        ring.setAttribute('animation', {
          property: 'scale',
          from: '0.5 0.5 0.5',
          to: '2 2 2',
          dur: 2000,
          loop: true,
          easing: 'linear'
        });
        ring.setAttribute('animation__fade', {
          property: 'material.opacity',
          from: 0.4,
          to: 0,
          dur: 2000,
          loop: true,
          easing: 'linear'
        });
        marker.appendChild(ring);

        // Label
        const text = document.createElement('a-text');
        text.setAttribute('value', def.label);
        text.setAttribute('position', '0 0.45 0');
        text.setAttribute('align', 'center');
        text.setAttribute('color', def.color);
        text.setAttribute('scale', '0.8 0.8 0.8');
        text.setAttribute('side', 'double');
        marker.appendChild(text);

        scene.appendChild(marker);

        // Web Audio API: oscillator + panner
        const osc = audioCtx.createOscillator();
        osc.type = def.type || 'sine';
        osc.frequency.value = def.freq;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.3;

        const panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';
        panner.distanceModel = 'inverse';
        panner.refDistance = 0.5;
        panner.maxDistance = 10;
        panner.rolloffFactor = 3;
        panner.setPosition(x, y, z);

        osc.connect(gain);
        gain.connect(panner);
        panner.connect(audioCtx.destination);
        osc.start();

        sources.push({ osc, gain, panner, marker, x, y, z, sphere });
      });

      document.getElementById('info').textContent = 'カメラを各ソースに向けてみてください';
      setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 3000);

      // Update listener position from camera
      const camera = document.getElementById('camera');
      setInterval(() => {
        if (!audioCtx || !camera.object3D) return;
        const pos = camera.object3D.position;
        const dir = new THREE.Vector3(0, 0, -1);
        dir.applyQuaternion(camera.object3D.quaternion);
        const up = new THREE.Vector3(0, 1, 0);

        if (audioCtx.listener.positionX) {
          audioCtx.listener.positionX.value = pos.x;
          audioCtx.listener.positionY.value = pos.y;
          audioCtx.listener.positionZ.value = pos.z;
          audioCtx.listener.forwardX.value = dir.x;
          audioCtx.listener.forwardY.value = dir.y;
          audioCtx.listener.forwardZ.value = dir.z;
          audioCtx.listener.upX.value = up.x;
          audioCtx.listener.upY.value = up.y;
          audioCtx.listener.upZ.value = up.z;
        } else {
          audioCtx.listener.setPosition(pos.x, pos.y, pos.z);
          audioCtx.listener.setOrientation(dir.x, dir.y, dir.z, up.x, up.y, up.z);
        }
      }, 50);
    });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
