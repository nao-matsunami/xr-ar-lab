<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Geo AR Demo — GPS位置情報AR</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none; text-align: center;
      max-width: 90%;
    }
    #gps-panel {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.7); color: #94a3b8;
      padding: 10px 16px; border-radius: 12px; font-size: 12px;
      font-family: monospace; min-width: 200px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #gps-panel .value { color: #00f0ff; }
    #compass-ring {
      position: fixed; bottom: 100px; right: 20px; z-index: 999;
      width: 70px; height: 70px;
    }
    #compass-ring canvas { width: 70px; height: 70px; }
    #place-btn {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 12px 24px; border: 2px solid #00f0ff;
      min-height: 44px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-radius: 25px; background: rgba(0,240,255,0.15);
      color: #00f0ff; font-size: 14px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #poi-list {
      position: fixed; bottom: 30px; left: 20px; z-index: 999;
      display: flex; flex-direction: column; gap: 4px;
    }
    .poi-tag {
      padding: 6px 12px; border-radius: 8px; font-size: 12px;
      font-family: sans-serif; color: #fff;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Geo AR</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> 屋外でGPSを許可してカメラを向ける</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>GPS位置情報でARオブジェクトを現実空間に配置</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>
  <div id="info">GPS位置情報ベースAR<br><small>周囲にPOI（ポイント）が表示されます</small></div>
  <div id="gps-panel">
    Lat: <span class="value" id="lat-val">---</span><br>
    Lon: <span class="value" id="lon-val">---</span><br>
    Accuracy: <span class="value" id="acc-val">---</span>m<br>
    Heading: <span class="value" id="heading-val">---</span>°
  </div>
  <div id="compass-ring"><canvas id="compass-canvas" width="140" height="140"></canvas></div>
  <button id="place-btn" onclick="dropPOI()">📍 現在地にPOI設置</button>
  <div id="poi-list"></div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"></a-camera>
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.5" position="1 4 2"></a-light>

    <!-- Ground reference -->
    <a-entity id="ground"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.3"></a-entity>

    <!-- North indicator -->
    <a-entity id="north-indicator" position="0 0 -10">
      <a-cone color="#E74C3C" position="0 0.5 0" radius-bottom="0.3" radius-top="0" height="0.8"
        rotation="0 0 0" material="shader: flat"></a-cone>
      <a-text value="N" position="0 1.5 0" align="center" color="#E74C3C"
        scale="1.5 1.5 1.5" side="double"></a-text>
    </a-entity>

    <!-- POI container (positioned relative to user via GPS offsets) -->
    <a-entity id="poi-container"></a-entity>

    <!-- Demo POIs (cardinal directions, 10m away) -->
    <a-entity id="demo-pois">
      <a-entity position="0 0 -10">
        <a-sphere color="#E74C3C" radius="0.3" material="shader: flat; opacity: 0.7; transparent: true"
          animation="property: scale; dir: alternate; from: 1 1 1; to: 1.2 1.2 1.2; dur: 1000; loop: true"></a-sphere>
        <a-text value="North\n10m" position="0 0.6 0" align="center" color="#E74C3C" scale="0.5 0.5 0.5" side="double"></a-text>
      </a-entity>
      <a-entity position="10 0 0">
        <a-sphere color="#3498DB" radius="0.3" material="shader: flat; opacity: 0.7; transparent: true"
          animation="property: scale; dir: alternate; from: 1 1 1; to: 1.2 1.2 1.2; dur: 1200; loop: true"></a-sphere>
        <a-text value="East\n10m" position="0 0.6 0" align="center" color="#3498DB" scale="0.5 0.5 0.5" side="double"></a-text>
      </a-entity>
      <a-entity position="0 0 10">
        <a-sphere color="#2ECC71" radius="0.3" material="shader: flat; opacity: 0.7; transparent: true"
          animation="property: scale; dir: alternate; from: 1 1 1; to: 1.2 1.2 1.2; dur: 1400; loop: true"></a-sphere>
        <a-text value="South\n10m" position="0 0.6 0" align="center" color="#2ECC71" scale="0.5 0.5 0.5" side="double"></a-text>
      </a-entity>
      <a-entity position="-10 0 0">
        <a-sphere color="#F39C12" radius="0.3" material="shader: flat; opacity: 0.7; transparent: true"
          animation="property: scale; dir: alternate; from: 1 1 1; to: 1.2 1.2 1.2; dur: 1600; loop: true"></a-sphere>
        <a-text value="West\n10m" position="0 0.6 0" align="center" color="#F39C12" scale="0.5 0.5 0.5" side="double"></a-text>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    let userLat = null, userLon = null;
    let heading = 0;
    let poiCount = 0;

    // GPS
    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          document.getElementById('lat-val').textContent = userLat.toFixed(6);
          document.getElementById('lon-val').textContent = userLon.toFixed(6);
          document.getElementById('acc-val').textContent = Math.round(pos.coords.accuracy);
        },
        (err) => {
          document.getElementById('lat-val').textContent = 'Error';
          document.getElementById('lon-val').textContent = err.message;
        },
        { enableHighAccuracy: true, maximumAge: 5000 }
      );
    }

    // Compass
    function handleOrientation(e) {
      if (e.alpha !== null) {
        heading = e.webkitCompassHeading || (360 - e.alpha);
        document.getElementById('heading-val').textContent = Math.round(heading);
        drawCompass(heading);

        // Rotate demo POIs container based on heading
        const container = document.getElementById('demo-pois');
        container.setAttribute('rotation', `0 ${heading} 0`);

        const north = document.getElementById('north-indicator');
        north.setAttribute('rotation', `0 ${heading} 0`);
        north.setAttribute('position', `${10 * Math.sin(heading * Math.PI / 180)} 0 ${-10 * Math.cos(heading * Math.PI / 180)}`);
      }
    }

    // Request permission (iOS 13+)
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.body.addEventListener('click', function reqPerm() {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation, true);
            }
          });
        document.body.removeEventListener('click', reqPerm);
      }, { once: true });
    } else {
      window.addEventListener('deviceorientation', handleOrientation, true);
    }

    // Draw compass
    const compassCanvas = document.getElementById('compass-canvas');
    const cctx = compassCanvas.getContext('2d');

    function drawCompass(deg) {
      const w = 140, cx = 70, cy = 70, r = 55;
      cctx.clearRect(0, 0, w, w);

      // Ring
      cctx.beginPath();
      cctx.arc(cx, cy, r, 0, Math.PI * 2);
      cctx.strokeStyle = 'rgba(255,255,255,0.3)';
      cctx.lineWidth = 2;
      cctx.stroke();

      // Cardinal marks
      const labels = ['N', 'E', 'S', 'W'];
      const colors = ['#E74C3C', '#3498DB', '#2ECC71', '#F39C12'];
      for (let i = 0; i < 4; i++) {
        const a = ((i * 90 - deg) * Math.PI) / 180 - Math.PI / 2;
        cctx.fillStyle = colors[i];
        cctx.font = 'bold 14px sans-serif';
        cctx.textAlign = 'center';
        cctx.textBaseline = 'middle';
        cctx.fillText(labels[i], cx + Math.cos(a) * (r - 12), cy + Math.sin(a) * (r - 12));
      }

      // Needle
      const na = (-deg * Math.PI) / 180 - Math.PI / 2;
      cctx.beginPath();
      cctx.moveTo(cx, cy);
      cctx.lineTo(cx + Math.cos(na) * (r - 25), cy + Math.sin(na) * (r - 25));
      cctx.strokeStyle = '#E74C3C';
      cctx.lineWidth = 3;
      cctx.stroke();

      // Center dot
      cctx.beginPath();
      cctx.arc(cx, cy, 4, 0, Math.PI * 2);
      cctx.fillStyle = '#fff';
      cctx.fill();
    }
    drawCompass(0);

    // Drop POI at current location
    function dropPOI() {
      if (!userLat) {
        alert('GPS信号を待っています...');
        return;
      }
      poiCount++;
      const container = document.getElementById('poi-container');

      // Place at a random offset (since we can't precisely convert GPS to AR coords in this demo)
      const angle = Math.random() * Math.PI * 2;
      const dist = 3 + Math.random() * 5;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;

      const colors = ['#E74C3C', '#3498DB', '#2ECC71', '#F39C12', '#9B59B6', '#1ABC9C'];
      const color = colors[poiCount % colors.length];

      const el = document.createElement('a-entity');
      el.setAttribute('position', `${x} 0 ${z}`);

      const marker = document.createElement('a-entity');
      // Pin body
      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('radius', '0.2');
      sphere.setAttribute('color', color);
      sphere.setAttribute('material', 'shader: flat; opacity: 0.8; transparent: true');
      sphere.setAttribute('position', '0 0.5 0');
      sphere.setAttribute('animation', 'property: position; dir: alternate; from: 0 0.4 0; to: 0 0.6 0; dur: 2000; loop: true; easing: easeInOutSine');
      marker.appendChild(sphere);

      // Label
      const text = document.createElement('a-text');
      text.setAttribute('value', `POI #${poiCount}\n${userLat.toFixed(4)}\n${userLon.toFixed(4)}`);
      text.setAttribute('position', '0 1 0');
      text.setAttribute('align', 'center');
      text.setAttribute('color', color);
      text.setAttribute('scale', '0.4 0.4 0.4');
      text.setAttribute('side', 'double');
      marker.appendChild(text);

      // Pulse ring on ground
      const ring = document.createElement('a-torus');
      ring.setAttribute('radius', '0.3');
      ring.setAttribute('radius-tubular', '0.01');
      ring.setAttribute('color', color);
      ring.setAttribute('material', 'shader: flat; opacity: 0.4; transparent: true');
      ring.setAttribute('rotation', '90 0 0');
      ring.setAttribute('animation', 'property: scale; from: 0.5 0.5 0.5; to: 2 2 2; dur: 2000; loop: true');
      ring.setAttribute('animation__fade', 'property: material.opacity; from: 0.4; to: 0; dur: 2000; loop: true');
      marker.appendChild(ring);

      el.appendChild(marker);
      container.appendChild(el);

      // Add to UI list
      const tag = document.createElement('div');
      tag.className = 'poi-tag';
      tag.style.borderColor = color;
      tag.textContent = `#${poiCount} ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
      document.getElementById('poi-list').appendChild(tag);
    }
    window.dropPOI = dropPOI;
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
    if (!('geolocation' in navigator)) {
      showError('gps');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
