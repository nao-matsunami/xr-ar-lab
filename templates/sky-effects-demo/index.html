<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Sky Effects AR Demo</title>

  <!-- 8frame (8th Wall版 A-Frame) -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <!-- XR Extras -->
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Landing Pages -->
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- Coaching Overlay (空の検出ガイド) -->
  <script src="https://cdn.8thwall.com/web/coaching-overlay/coaching-overlay.js"></script>

  <!-- 8th Wall Engine (ローカルバイナリ — LayersControllerはコアに内蔵、チャンクプリロード不要) -->
  <script async src="../../vendor/engine/xr-standalone/xr.js"></script>

  <script src="./sky-recenter.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #sky-switcher {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #sky-switcher button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; transition: all 0.2s;
    }
    #sky-switcher button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #sky-switcher button:active { transform: scale(0.95); }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>

<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Sky Effects</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> カメラを空に向ける</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>空をspace/sunset/aurora/neonに置き換え</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="sky-switcher">
    <button class="active" onclick="switchSky('space')">Space</button>
    <button onclick="switchSky('sunset')">Sunset</button>
    <button onclick="switchSky('aurora')">Aurora</button>
    <button onclick="switchSky('neon')">Neon</button>
  </div>

  <a-scene
    xrextras-loading
    xrextras-runtime-error
    landing-page
    sky-coaching-overlay
    sky-recenter
    renderer="colorManagement: true"
    xrlayers="allowedDevices: any">

    <a-camera position="0 3 0"></a-camera>

    <!-- スカイレイヤーシーン: 空が検出された部分にこの内容が表示される -->
    <a-entity xrlayerscene="name: sky; edgeSmoothness: 0.6">

      <!-- 空の背景（切り替え可能） -->
      <a-sky id="sky-bg" color="#0f1555"></a-sky>

      <!-- 浮遊するオブジェクト群 -->
      <a-entity id="sky-objects-space">
        <!-- 星々（大きく明るく） -->
        <a-sphere position="5 15 -20" radius="0.5" color="#FFFFFF"
                  material="shader: flat"
                  animation="property: position; to: 5 16 -20; dir: alternate; loop: true; dur: 3000; easing: easeInOutSine"></a-sphere>
        <a-sphere position="-8 20 -15" radius="0.4" color="#FFFFCC"
                  material="shader: flat"
                  animation="property: position; to: -8 21 -15; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine"></a-sphere>
        <a-sphere position="12 18 -25" radius="0.35" color="#CCCCFF"
                  material="shader: flat"
                  animation="property: position; to: 12 19 -25; dir: alternate; loop: true; dur: 4000; easing: easeInOutSine"></a-sphere>
        <a-sphere position="-12 22 -18" radius="0.3" color="#FFFFFF"
                  material="shader: flat"
                  animation="property: material.opacity; from: 1; to: 0.3; dir: alternate; loop: true; dur: 2000"></a-sphere>
        <a-sphere position="8 25 -22" radius="0.25" color="#FFFFEE"
                  material="shader: flat"
                  animation="property: material.opacity; from: 0.8; to: 0.2; dir: alternate; loop: true; dur: 3500"></a-sphere>

        <!-- 惑星（大きく） -->
        <a-sphere position="0 12 -18" radius="3" color="#AD50FF"
                  material="shader: flat"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-sphere>
        <a-torus position="0 12 -18" radius="4.5" radius-tubular="0.15"
                 rotation="75 0 0" color="#E8A0FF"
                 material="shader: flat; opacity: 0.8"></a-torus>

        <!-- 流れ星 -->
        <a-sphere position="-15 25 -30" radius="0.2" color="#FFFFFF"
                  material="shader: flat"
                  animation="property: position; to: 15 5 -10; loop: true; dur: 2000; easing: linear;
                             delay: 3000"></a-sphere>
      </a-entity>

      <!-- 夕焼けオブジェクト（初期非表示） -->
      <a-entity id="sky-objects-sunset" visible="false">
        <!-- 太陽（大きく明るく） -->
        <a-sphere position="0 8 -30" radius="7" color="#FFD700"
                  material="shader: flat; opacity: 1"></a-sphere>
        <a-sphere position="0 8 -30" radius="9" color="#FF6B35"
                  material="shader: flat; opacity: 0.4; transparent: true"></a-sphere>
        <!-- 雲（大きく鮮やかに） -->
        <a-box position="-10 14 -20" scale="12 2 4" color="#FF9F6B"
               material="shader: flat; opacity: 0.7"
               animation="property: position; to: -6 14 -20; dir: alternate; loop: true; dur: 8000; easing: easeInOutSine"></a-box>
        <a-box position="8 16 -22" scale="10 1.5 3.5" color="#FFB88C"
               material="shader: flat; opacity: 0.6"
               animation="property: position; to: 12 16 -22; dir: alternate; loop: true; dur: 10000; easing: easeInOutSine"></a-box>
        <a-box position="-4 18 -25" scale="8 1 3" color="#FF7F50"
               material="shader: flat; opacity: 0.5"
               animation="property: position; to: 0 18 -25; dir: alternate; loop: true; dur: 12000; easing: easeInOutSine"></a-box>
      </a-entity>

      <!-- オーロラオブジェクト（初期非表示） -->
      <a-entity id="sky-objects-aurora" visible="false">
        <!-- オーロラ帯（より明るく幅広く） -->
        <a-plane position="0 18 -25" width="50" height="10" color="#00FF88"
                 material="shader: flat; opacity: 0.5; side: double; transparent: true"
                 rotation="10 0 5"
                 animation="property: material.opacity; from: 0.3; to: 0.7; dir: alternate; loop: true; dur: 3000"></a-plane>
        <a-plane position="5 20 -28" width="45" height="8" color="#00BFFF"
                 material="shader: flat; opacity: 0.4; side: double; transparent: true"
                 rotation="-5 10 -3"
                 animation="property: material.opacity; from: 0.25; to: 0.6; dir: alternate; loop: true; dur: 4000; delay: 500"></a-plane>
        <a-plane position="-3 16 -22" width="40" height="7" color="#8B5CF6"
                 material="shader: flat; opacity: 0.35; side: double; transparent: true"
                 rotation="8 -5 2"
                 animation="property: material.opacity; from: 0.2; to: 0.55; dir: alternate; loop: true; dur: 3500; delay: 1000"></a-plane>
        <a-plane position="3 22 -26" width="35" height="6" color="#00ff44"
                 material="shader: flat; opacity: 0.3; side: double; transparent: true"
                 rotation="-3 5 8"
                 animation="property: material.opacity; from: 0.15; to: 0.45; dir: alternate; loop: true; dur: 5000; delay: 700"></a-plane>
        <!-- 星 -->
        <a-sphere position="10 22 -20" radius="0.3" color="#FFF" material="shader: flat"></a-sphere>
        <a-sphere position="-12 24 -25" radius="0.25" color="#FFF" material="shader: flat"></a-sphere>
        <a-sphere position="5 26 -30" radius="0.2" color="#FFF" material="shader: flat"></a-sphere>
        <a-sphere position="-6 28 -22" radius="0.15" color="#FFF" material="shader: flat"></a-sphere>
      </a-entity>

      <!-- ネオンオブジェクト（初期非表示） -->
      <a-entity id="sky-objects-neon" visible="false">
        <!-- ネオンリング（大きく明るく） -->
        <a-torus position="0 15 -20" radius="5" radius-tubular="0.25"
                 color="#FF00FF" material="shader: flat"
                 animation="property: rotation; to: 360 360 0; loop: true; dur: 10000; easing: linear"></a-torus>
        <a-torus position="0 15 -20" radius="7.5" radius-tubular="0.2"
                 color="#00FFFF" material="shader: flat"
                 animation="property: rotation; to: -360 0 360; loop: true; dur: 15000; easing: linear"></a-torus>
        <a-torus position="0 15 -20" radius="3" radius-tubular="0.15"
                 color="#FFFF00" material="shader: flat"
                 animation="property: rotation; to: 0 -360 360; loop: true; dur: 8000; easing: linear"></a-torus>
        <!-- ネオンキューブ（大きく） -->
        <a-box position="-8 18 -15" scale="3 3 3" color="#FF00FF"
               material="shader: flat; opacity: 0.8; wireframe: true"
               animation="property: rotation; to: 360 360 0; loop: true; dur: 6000; easing: linear"></a-box>
        <a-box position="10 12 -18" scale="2.5 2.5 2.5" color="#00FFFF"
               material="shader: flat; opacity: 0.8; wireframe: true"
               animation="property: rotation; to: 0 360 360; loop: true; dur: 8000; easing: linear"></a-box>
        <a-box position="-5 10 -20" scale="2 2 2" color="#FF6600"
               material="shader: flat; opacity: 0.7; wireframe: true"
               animation="property: rotation; to: 360 0 360; loop: true; dur: 7000; easing: linear"></a-box>
        <!-- グリッドライン -->
        <a-plane position="0 10 -25" width="50" height="20" color="#FF00FF"
                 material="shader: flat; opacity: 0.15; wireframe: true; transparent: true"
                 rotation="0 0 0"></a-plane>
      </a-entity>

      <a-entity light="type: ambient; intensity: 1;"></a-entity>
    </a-entity>

  </a-scene>

  <script>
    // 空エフェクト切り替え
    const skyColors = {
      space:  '#0f1555',
      sunset: '#FF6B35',
      aurora: '#0c1e3a',
      neon:   '#12002a',
    }

    function switchSky(name) {
      // 背景色を変更
      const sky = document.getElementById('sky-bg')
      if (sky) sky.setAttribute('color', skyColors[name] || '#0a0a2e')

      // オブジェクトグループを切り替え
      const groups = ['space', 'sunset', 'aurora', 'neon']
      groups.forEach(g => {
        const el = document.getElementById('sky-objects-' + g)
        if (el) el.setAttribute('visible', g === name)
      })

      // ボタンのアクティブ状態を更新
      document.querySelectorAll('#sky-switcher button').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === name)
      })
    }
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
