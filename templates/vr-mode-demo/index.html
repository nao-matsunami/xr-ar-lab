<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>VR Mode Demo</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none; text-align: center;
    }
    #scene-buttons {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #scene-buttons button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: all 0.2s;
    }
    #scene-buttons button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #vr-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 999;
      padding: 12px 18px; border: 2px solid #fff; border-radius: 12px;
      background: rgba(0,0,0,0.5); color: #fff; font-size: 14px;
      min-height: 44px; font-weight: 600; cursor: pointer;
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 130px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>VR Mode</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> カメラは不要 / 画面をドラッグ</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>360度パノラマVRビューア</li>
        <li>宇宙・夕焼け・オーロラ・ネオン</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="info">スマホを動かして360度パノラマを体験<br><small>ジャイロ / マウスドラッグ対応</small></div>
  <div id="scene-buttons">
    <button class="active" data-scene="space" onclick="setScene('space',this)">宇宙</button>
    <button data-scene="sunset" onclick="setScene('sunset',this)">夕焼け</button>
    <button data-scene="aurora" onclick="setScene('aurora',this)">オーロラ</button>
    <button data-scene="neon" onclick="setScene('neon',this)">ネオン</button>
  </div>
  <button id="vr-toggle" onclick="toggleVR()">VR Mode</button>

  <a-scene embedded vr-mode-ui="enabled: true"
    style="width:100vw; height:100vh;"
    renderer="colorManagement: true">

    <a-camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"
      wasd-controls="enabled: false"></a-camera>

    <a-sky id="sky" color="#000005"></a-sky>

    <!-- Stars container -->
    <a-entity id="stars"></a-entity>

    <!-- === Pre-built scene entities (toggle visible) === -->

    <!-- Space scene -->
    <a-entity id="scene-space" visible="true">
      <a-sphere position="8 2 -20" radius="3" color="#2244aa" material="shader: flat"
        animation="property: rotation; to: 0 360 10; dur: 40000; loop: true; easing: linear"></a-sphere>
      <a-sphere position="-12 -3 -18" radius="2" color="#aa3322" material="shader: flat"
        animation="property: rotation; to: 0 360 -5; dur: 30000; loop: true; easing: linear"></a-sphere>
      <a-entity position="-6 5 -15" animation="property: rotation; to: 10 360 0; dur: 50000; loop: true; easing: linear">
        <a-sphere radius="1.8" color="#C4A265" material="shader: flat"></a-sphere>
        <a-torus radius="3" radius-tubular="0.08" rotation="75 0 0" color="#B8860B" material="shader: flat; opacity: 0.6; transparent: true" segments-tubular="48"></a-torus>
      </a-entity>
      <a-sphere position="15 8 -25" radius="6" material="shader: flat; color: #4400aa; opacity: 0.12; transparent: true"></a-sphere>
      <a-sphere position="-20 -5 -30" radius="8" material="shader: flat; color: #aa0044; opacity: 0.08; transparent: true"></a-sphere>
      <a-sphere position="5 -10 -22" radius="5" material="shader: flat; color: #0044aa; opacity: 0.1; transparent: true"></a-sphere>
      <a-sphere position="0 3 -8" radius="0.3" color="#FFD700" material="shader: flat"
        animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; dur: 1000; loop: true"></a-sphere>
    </a-entity>

    <!-- Sunset scene -->
    <a-entity id="scene-sunset" visible="false">
      <a-sphere position="0 -1 -20" radius="5" color="#FFD700" material="shader: flat"></a-sphere>
      <a-sphere position="0 -1 -20" radius="7" material="shader: flat; color: #FF8C00; opacity: 0.3; transparent: true"></a-sphere>
      <a-plane position="0 -3 0" rotation="-90 0 0" width="200" height="200" color="#8B4513" material="shader: flat"></a-plane>
      <a-box position="-8 4 -12" scale="4 0.4 2" material="shader: flat; color: #ffccaa; opacity: 0.4; transparent: true"
        animation="property: position; to: -3 4 -12; dir: alternate; dur: 18000; loop: true; easing: easeInOutSine"></a-box>
      <a-box position="6 5 -15" scale="5 0.3 2.5" material="shader: flat; color: #ffccaa; opacity: 0.4; transparent: true"
        animation="property: position; to: 11 5 -15; dir: alternate; dur: 22000; loop: true; easing: easeInOutSine"></a-box>
      <a-box position="-3 6 -18" scale="6 0.35 3" material="shader: flat; color: #ffccaa; opacity: 0.4; transparent: true"
        animation="property: position; to: 2 6 -18; dir: alternate; dur: 25000; loop: true; easing: easeInOutSine"></a-box>
      <a-box position="10 3.5 -10" scale="3.5 0.3 1.8" material="shader: flat; color: #ffccaa; opacity: 0.4; transparent: true"
        animation="property: position; to: 15 3.5 -10; dir: alternate; dur: 20000; loop: true; easing: easeInOutSine"></a-box>
      <a-box position="-12 5.5 -14" scale="4.5 0.35 2.2" material="shader: flat; color: #ffccaa; opacity: 0.4; transparent: true"
        animation="property: position; to: -7 5.5 -14; dir: alternate; dur: 17000; loop: true; easing: easeInOutSine"></a-box>
      <a-entity position="-15 6 -8" animation="property: position; to: 15 7 -10; dur: 25000; loop: true; easing: linear">
        <a-triangle color="#333" vertex-a="0 0 0" vertex-b="-0.3 0.15 0" vertex-c="-0.15 0 0" material="shader: flat"></a-triangle>
      </a-entity>
    </a-entity>

    <!-- Aurora scene -->
    <a-entity id="scene-aurora" visible="false">
      <a-plane position="-6 8 -15" width="20" height="3" material="shader: flat; color: #00ff88; opacity: 0.2; transparent: true; side: double"
        animation="property: position; to: -4 9 -15; dir: alternate; dur: 6000; loop: true; easing: easeInOutSine"
        animation__scale="property: scale; from: 1 1 1; to: 1.1 1.3 1; dir: alternate; dur: 8000; loop: true; easing: easeInOutSine"
        animation__opacity="property: material.opacity; from: 0.2; to: 0.36; dir: alternate; dur: 7000; loop: true"></a-plane>
      <a-plane position="-3 6 -12" width="18" height="2.5" material="shader: flat; color: #00ccff; opacity: 0.18; transparent: true; side: double"
        animation="property: position; to: -1 7.5 -12; dir: alternate; dur: 8000; loop: true; easing: easeInOutSine"
        animation__scale="property: scale; from: 1 1 1; to: 1.1 1.3 1; dir: alternate; dur: 10000; loop: true; easing: easeInOutSine"
        animation__opacity="property: material.opacity; from: 0.18; to: 0.32; dir: alternate; dur: 9000; loop: true"></a-plane>
      <a-plane position="0 10 -18" width="22" height="2" material="shader: flat; color: #8B5CF6; opacity: 0.15; transparent: true; side: double"
        animation="property: position; to: 2 11 -18; dir: alternate; dur: 5000; loop: true; easing: easeInOutSine"
        animation__scale="property: scale; from: 1 1 1; to: 1.1 1.3 1; dir: alternate; dur: 7000; loop: true; easing: easeInOutSine"
        animation__opacity="property: material.opacity; from: 0.15; to: 0.27; dir: alternate; dur: 6000; loop: true"></a-plane>
      <a-plane position="3 7 -20" width="15" height="4" material="shader: flat; color: #00ff88; opacity: 0.12; transparent: true; side: double"
        animation="property: position; to: 5 8.5 -20; dir: alternate; dur: 7000; loop: true; easing: easeInOutSine"
        animation__opacity="property: material.opacity; from: 0.12; to: 0.22; dir: alternate; dur: 8000; loop: true"></a-plane>
      <a-plane position="6 9 -14" width="16" height="2" material="shader: flat; color: #00aaff; opacity: 0.16; transparent: true; side: double"
        animation="property: position; to: 8 10 -14; dir: alternate; dur: 9000; loop: true; easing: easeInOutSine"
        animation__opacity="property: material.opacity; from: 0.16; to: 0.29; dir: alternate; dur: 10000; loop: true"></a-plane>
      <a-plane position="0 -2 0" rotation="-90 0 0" width="200" height="200" color="#1a2a3a" material="shader: flat"></a-plane>
      <a-cone position="-18 -0.5 -25" radius-bottom="2.5" radius-top="0" height="3" color="#0a1520" material="shader: flat"></a-cone>
      <a-cone position="-12 0 -25" radius-bottom="3" radius-top="0" height="4" color="#0a1520" material="shader: flat"></a-cone>
      <a-cone position="-6 -0.2 -25" radius-bottom="2" radius-top="0" height="3.5" color="#0a1520" material="shader: flat"></a-cone>
      <a-cone position="0 0.5 -25" radius-bottom="2.8" radius-top="0" height="5" color="#0a1520" material="shader: flat"></a-cone>
      <a-cone position="6 -0.3 -25" radius-bottom="2.2" radius-top="0" height="3.2" color="#0a1520" material="shader: flat"></a-cone>
      <a-cone position="12 0.2 -25" radius-bottom="3.2" radius-top="0" height="4.4" color="#0a1520" material="shader: flat"></a-cone>
      <a-cone position="18 -0.5 -25" radius-bottom="2" radius-top="0" height="2.5" color="#0a1520" material="shader: flat"></a-cone>
    </a-entity>

    <!-- Neon scene (reduced objects) -->
    <a-entity id="scene-neon" visible="false">
      <!-- Grid floor (single plane with wireframe) -->
      <a-plane position="0 -0.01 0" rotation="-90 0 0" width="20" height="20"
        material="shader: flat; color: #ff00ff; opacity: 0.2; transparent: true; wireframe: true"
        segments-width="10" segments-height="10"></a-plane>
      <!-- Torus rings -->
      <a-torus position="0 4 -8" radius="2" radius-tubular="0.05" color="#ff0066"
        material="shader: flat"
        animation="property: rotation; to: 360 360 0; dur: 8000; loop: true; easing: linear"></a-torus>
      <a-torus position="0 4 -8" radius="2.5" radius-tubular="0.04" color="#00ffff"
        material="shader: flat" rotation="90 0 0"
        animation="property: rotation; to: 90 360 360; dur: 12000; loop: true; easing: linear"></a-torus>
      <!-- Floating spheres -->
      <a-sphere position="-4 3 -5" radius="0.4" color="#ff00ff" material="shader: flat"
        animation="property: position; to: -4 4.5 -5; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dir: alternate; dur: 1500; loop: true"></a-sphere>
      <a-sphere position="4 2 -6" radius="0.3" color="#00ffff" material="shader: flat"
        animation="property: position; to: 4 3.5 -6; dir: alternate; dur: 4000; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dir: alternate; dur: 2000; loop: true"></a-sphere>
      <a-sphere position="-2 5 -7" radius="0.5" color="#ffff00" material="shader: flat"
        animation="property: position; to: -2 6 -7; dir: alternate; dur: 3500; loop: true; easing: easeInOutSine"></a-sphere>
      <a-sphere position="3 4 -4" radius="0.25" color="#ff6600" material="shader: flat"
        animation="property: position; to: 3 5.5 -4; dir: alternate; dur: 2500; loop: true; easing: easeInOutSine"></a-sphere>
      <!-- Pillars -->
      <a-box position="-4 2.5 -6" scale="0.3 5 0.3" color="#ff00ff" material="shader: flat"
        animation="property: material.color; from: #ff00ff; to: #00ffff; dir: alternate; dur: 2000; loop: true"></a-box>
      <a-box position="4 2 -6" scale="0.3 4 0.3" color="#00ffff" material="shader: flat"
        animation="property: material.color; from: #00ffff; to: #ff00ff; dir: alternate; dur: 2000; loop: true"></a-box>
      <!-- Diamond -->
      <a-octahedron position="0 2 -5" radius="0.6" color="#ffffff"
        material="shader: flat; opacity: 0.8; transparent: true"
        animation="property: rotation; to: 0 360 180; dur: 6000; loop: true; easing: linear"
        animation__float="property: position; to: 0 3 -5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-octahedron>
    </a-entity>

  </a-scene>

  <script>
    var sky = document.getElementById('sky');
    var starsEl = document.getElementById('stars');
    var starsBuilt = false;

    // ============ Star generation (once) ============
    function ensureStars() {
      if (starsBuilt) return;
      starsBuilt = true;
      for (var i = 0; i < 250; i++) {
        var star = document.createElement('a-sphere');
        var theta = Math.random() * Math.PI * 2;
        var phi = Math.random() * Math.PI;
        var r = 30 + Math.random() * 20;
        var x = r * Math.sin(phi) * Math.cos(theta);
        var y = r * Math.cos(phi);
        var z = r * Math.sin(phi) * Math.sin(theta);
        star.setAttribute('position', x.toFixed(2) + ' ' + y.toFixed(2) + ' ' + z.toFixed(2));
        star.setAttribute('radius', (0.01 + Math.random() * 0.04).toFixed(3));
        star.setAttribute('material', 'shader: flat; color: #ffffff');
        var fromOp = (0.4 + Math.random() * 0.6).toFixed(2);
        var toOp = (Math.random() * 0.3).toFixed(2);
        var dur = Math.round(800 + Math.random() * 3000);
        star.setAttribute('animation', 'property: material.opacity; from: ' + fromOp + '; to: ' + toOp + '; dir: alternate; dur: ' + dur + '; loop: true');
        starsEl.appendChild(star);
      }
    }

    // Sky colors per scene
    var skyColors = {
      space: '#000005', sunset: '#ff6b35', aurora: '#001a0a', neon: '#0d0d1a'
    };
    var showStars = { space: true, sunset: false, aurora: true, neon: false };
    var sceneNames = ['space', 'sunset', 'aurora', 'neon'];

    // ============ Scene switching (toggle visible) ============
    function setScene(name, btn) {
      sky.setAttribute('color', skyColors[name] || '#000005');

      // Stars
      if (showStars[name]) {
        ensureStars();
        starsEl.setAttribute('visible', true);
      } else {
        starsEl.setAttribute('visible', false);
      }

      // Toggle scene entities
      sceneNames.forEach(function(s) {
        var el = document.getElementById('scene-' + s);
        if (el) el.setAttribute('visible', s === name);
      });

      // Button active state
      document.querySelectorAll('#scene-buttons button').forEach(function(b) {
        b.classList.remove('active');
      });
      if (btn) btn.classList.add('active');
    }

    function toggleVR() {
      var scene = document.querySelector('a-scene');
      if (scene.is('vr-mode')) {
        scene.exitVR();
      } else {
        scene.enterVR();
      }
    }

    window.setScene = setScene;
    window.toggleVR = toggleVR;

    // Initial scene
    document.querySelector('a-scene').addEventListener('loaded', function() {
      setScene('space', document.querySelector('#scene-buttons button[data-scene="space"]'));
    });
    setTimeout(function() {
      setScene('space', document.querySelector('#scene-buttons button[data-scene="space"]'));
    }, 1000);
  </script>

  <script>
    // Error handling (VR mode - no camera required)
    function showError(type) {
      var messages = {
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このVRデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
