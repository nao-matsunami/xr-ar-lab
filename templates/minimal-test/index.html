<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Minimal Test (No Extras)</title>

    <!-- 8frame (8th Wall版 A-Frame) -->
    <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

    <!-- 8th Wall Engine (ローカルバイナリ) -->
    <script async src="../../lib/xr.js" data-preload-chunks="slam"></script>
  </head>

  <body>
    <a-scene xrweb="allowedDevices: any">

      <a-camera
        id="camera"
        position="0 8 0">
      </a-camera>

      <a-box position="0 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>

    </a-scene>
  </body>
</html>
