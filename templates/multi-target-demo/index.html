<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Multi Target AR Demo</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
    }
    #status-panel {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .target-status {
      padding: 10px 16px; border-radius: 12px; font-size: 13px;
      min-height: 44px; display: flex; align-items: center;
      font-family: sans-serif; font-weight: 600;
      background: rgba(0,0,0,0.5); color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .target-status.found {
      color: #4ade80; border-color: #4ade80;
      background: rgba(74,222,128,0.15);
    }
  </style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>
  <div id="info">画像ターゲットにカメラをかざしてください</div>
  <div id="status-panel">
    <div class="target-status" id="status-a">Target A</div>
    <div class="target-status" id="status-b">Target B</div>
    <div class="target-status" id="status-c">Target C</div>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any; disableWorldTracking: true">

    <a-camera id="camera" position="0 4 4"></a-camera>
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" intensity="0.6" position="1 2 1"></a-light>

    <!-- Target A: Red Box -->
    <xrextras-named-image-target name="target-a">
      <a-box color="#E74C3C" position="0 0.3 0" scale="0.001 0.001 0.001"
        animation="property: scale; to: 0.5 0.5 0.5; dur: 600; easing: easeOutElastic"
        animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-box>
      <a-text value="Target A" position="0 0.7 0" align="center" color="#E74C3C"
        scale="0.5 0.5 0.5" side="double"></a-text>
    </xrextras-named-image-target>

    <!-- Target B: Blue Sphere -->
    <xrextras-named-image-target name="target-b">
      <a-sphere color="#3498DB" position="0 0.3 0" radius="0.001"
        animation="property: radius; to: 0.25; dur: 600; easing: easeOutElastic"
        animation__float="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: 0 0.5 0">
      </a-sphere>
      <a-text value="Target B" position="0 0.85 0" align="center" color="#3498DB"
        scale="0.5 0.5 0.5" side="double"></a-text>
    </xrextras-named-image-target>

    <!-- Target C: Green Torus -->
    <xrextras-named-image-target name="target-c">
      <a-torus color="#2ECC71" position="0 0.35 0" radius="0.2" radius-tubular="0.05"
        scale="0.001 0.001 0.001"
        animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutElastic"
        animation__rotate="property: rotation; to: 360 360 0; loop: true; dur: 6000; easing: linear">
      </a-torus>
      <a-text value="Target C" position="0 0.75 0" align="center" color="#2ECC71"
        scale="0.5 0.5 0.5" side="double"></a-text>
    </xrextras-named-image-target>

  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const targets = ['target-a', 'target-b', 'target-c'];

    scene.addEventListener('xrimagefound', (e) => {
      const name = e.detail.name;
      const el = document.getElementById('status-' + name.split('-')[1]);
      if (el) el.classList.add('found');
    });

    scene.addEventListener('xrimagelost', (e) => {
      const name = e.detail.name;
      const el = document.getElementById('status-' + name.split('-')[1]);
      if (el) el.classList.remove('found');
    });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>
</body>
</html>
