<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Physics AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- Physics Engine -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
    }
    #score {
      position: fixed; top: 60px; right: 20px;
      z-index: 999; background: rgba(0,0,0,0.5); color: #ff6b6b;
      padding: 8px 14px; border-radius: 12px; font-size: 18px;
      font-family: monospace; font-weight: bold;
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Physics</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> 地面を検出してタップ</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>物理演算でトマトを投げる</li>
        <li>重力・跳ね返りを体験</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="instructions">画面タップでトマトを投げる 🍅</div>
  <div id="score">🍅 0</div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    physics="gravity: -9.8; restitution: 0.6; friction: 0.1; iterations: 2"
    xrweb="allowedDevices: any">

    <a-assets>
      <a-asset-item id="tomatoModel" src="./assets/tomato.glb"></a-asset-item>
      <audio id="splat" src="./assets/splat.m4a" preload="auto"></audio>
    </a-assets>

    <a-camera id="camera" position="0 4 4"></a-camera>

    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.6" position="1 4 2"
      light="castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048"></a-light>

    <!-- Physics ground plane -->
    <a-entity id="ground"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"
      body="type: static; shape: box; restitution: 0.6"
      shape="shape: box; halfExtents: 50 50 0.01"></a-entity>
  </a-scene>

  <script>
    const camera = document.getElementById('camera');
    const scene = document.querySelector('a-scene');
    let tossCount = 0;
    let activeTomatoes = [];
    const MAX_TOMATOES = 10;

    // Shoot tomato on touch
    scene.addEventListener('touchstart', (event) => {
      // Clean up old tomatoes
      while (activeTomatoes.length >= MAX_TOMATOES) {
        const old = activeTomatoes.shift();
        if (old.parentNode) old.parentNode.removeChild(old);
      }

      const tomato = document.createElement('a-entity');

      // Position at camera
      const camPos = camera.object3D.position.clone();
      tomato.setAttribute('position', camPos);

      // Random rotation
      tomato.setAttribute('rotation', {
        x: -90 + Math.random() * 30,
        y: Math.random() * 360,
        z: 0
      });

      tomato.setAttribute('gltf-model', '#tomatoModel');
      tomato.setAttribute('scale', '1 1 1');
      tomato.setAttribute('shadow', 'cast: true');

      // Physics body
      tomato.setAttribute('body', {
        type: 'dynamic',
        sphereRadius: 0.35,
        shape: 'sphere',
        restitution: 0.6,
        linearDamping: 0.1,
      });

      // Calculate velocity in camera direction
      const direction = new THREE.Vector3(0, 0, -10);
      direction.applyQuaternion(camera.object3D.quaternion);
      tomato.setAttribute('velocity', direction);

      scene.appendChild(tomato);
      activeTomatoes.push(tomato);

      tossCount++;
      document.getElementById('score').textContent = '🍅 ' + tossCount;

      // Collision detection
      let collideCount = 0;
      tomato.addEventListener('collide', (e) => {
        if (e.detail.body.el.id !== 'ground') return;
        collideCount++;
        if (collideCount > 3) return;  // Allow a few bounces before splat
        if (collideCount < 3) return;  // Only splat on 3rd bounce

        // Play splat sound
        const splatAudio = document.getElementById('splat');
        splatAudio.currentTime = 0;
        splatAudio.play().catch(() => {});

        // Create splat effect at impact
        const splatPos = tomato.object3D.position.clone();
        const splat = document.createElement('a-cylinder');
        splat.setAttribute('position', splatPos);
        splat.setAttribute('radius', '0.1');
        splat.setAttribute('height', '0.02');
        splat.setAttribute('color', '#ff3333');
        splat.setAttribute('material', 'shader: flat; opacity: 0.8');
        splat.setAttribute('animation', {
          property: 'scale',
          to: '3 1 3',
          dur: 400,
          easing: 'easeOutQuad'
        });
        splat.setAttribute('animation__fade', {
          property: 'material.opacity',
          to: 0,
          dur: 2000,
          delay: 1000,
          easing: 'easeInQuad'
        });
        scene.appendChild(splat);

        // Hide tomato after splat
        setTimeout(() => {
          tomato.setAttribute('visible', 'false');
        }, 100);

        // Clean up splat
        setTimeout(() => {
          if (splat.parentNode) splat.parentNode.removeChild(splat);
        }, 3500);
      });
    });

    // Hide instructions after first toss
    scene.addEventListener('touchstart', () => {
      setTimeout(() => {
        document.getElementById('instructions').style.opacity = '0';
      }, 2000);
    }, { once: true });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
