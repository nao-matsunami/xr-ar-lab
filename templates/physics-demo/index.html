<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Physics AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- cannon.js direct -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
      transition: opacity 0.5s;
    }
    #score {
      position: fixed; top: 60px; right: 20px;
      z-index: 999; background: rgba(0,0,0,0.5); color: #ff6b6b;
      padding: 8px 14px; border-radius: 12px; font-size: 18px;
      font-family: monospace; font-weight: bold;
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Physics</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> 画面をタップしてボールを投げる</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>物理演算でボールを投げる</li>
        <li>重力・跳ね返りを体験</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="instructions">画面タップでボールを投げる</div>
  <div id="score">0</div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    shadow="type: pcfsoft; autoUpdate: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"></a-camera>

    <a-light type="ambient" intensity="0.4"></a-light>
    <a-light type="directional" intensity="0.8" position="1 4 2"
      light="castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048;
             shadowCameraTop: 10; shadowCameraBottom: -10;
             shadowCameraRight: 10; shadowCameraLeft: -10"></a-light>

    <!-- Visual ground (shadow only) -->
    <a-entity id="ground"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>
  </a-scene>

  <script>
    // === cannon.js Direct Physics ===
    var world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;

    // Materials with restitution
    var groundMaterial = new CANNON.Material('ground');
    var ballMaterial = new CANNON.Material('ball');
    var contactMaterial = new CANNON.ContactMaterial(groundMaterial, ballMaterial, {
      restitution: 0.7,
      friction: 0.3
    });
    world.addContactMaterial(contactMaterial);

    // Ground body (y=0 plane)
    var groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
    groundBody.addShape(new CANNON.Plane());
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
    world.addBody(groundBody);

    // Track active balls
    var bodies = [];
    var MAX_BALLS = 10;
    var tossCount = 0;

    var camera = document.getElementById('camera');
    var scene = document.querySelector('a-scene');

    // Ball colors
    var colors = ['#ff4444', '#ff8800', '#ffcc00', '#44ff44', '#4488ff', '#cc44ff'];

    function throwBall() {
      // Clean up old balls
      while (bodies.length >= MAX_BALLS) {
        var old = bodies.shift();
        world.removeBody(old.body);
        if (old.el.parentNode) old.el.parentNode.removeChild(old.el);
      }

      var radius = 0.15;
      var ballBody = new CANNON.Body({ mass: 1, material: ballMaterial });
      ballBody.addShape(new CANNON.Sphere(radius));

      // Start at camera position
      var camPos = camera.object3D.position;
      ballBody.position.set(camPos.x, camPos.y, camPos.z);

      // Throw in camera direction
      var dir = new THREE.Vector3(0, 0, -1);
      dir.applyQuaternion(camera.object3D.quaternion);
      // Add upward arc
      dir.y += 0.3;
      dir.normalize();
      var speed = 12;
      ballBody.velocity.set(dir.x * speed, dir.y * speed, dir.z * speed);

      // Add some spin
      ballBody.angularVelocity.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10
      );

      world.addBody(ballBody);

      // Visual ball
      var color = colors[tossCount % colors.length];
      var ballEl = document.createElement('a-sphere');
      ballEl.setAttribute('radius', radius);
      ballEl.setAttribute('color', color);
      ballEl.setAttribute('material', 'shader: flat');
      ballEl.setAttribute('shadow', 'cast: true');
      scene.appendChild(ballEl);

      bodies.push({ body: ballBody, el: ballEl, bounces: 0 });

      tossCount++;
      document.getElementById('score').textContent = tossCount;

      // Track bounces via collision
      ballBody.addEventListener('collide', function(e) {
        var entry = bodies.find(function(b) { return b.body === ballBody; });
        if (entry) entry.bounces++;
      });
    }

    // Throw on touch
    scene.addEventListener('touchstart', function(e) {
      throwBall();
    });

    // Physics step + sync to A-Frame
    var lastTime = performance.now();

    function physicsTick() {
      var now = performance.now();
      var dt = (now - lastTime) / 1000;
      lastTime = now;

      // Cap delta to avoid explosion
      if (dt > 0.1) dt = 0.1;

      world.step(1 / 60, dt, 3);

      for (var i = 0; i < bodies.length; i++) {
        var b = bodies[i];
        var p = b.body.position;
        b.el.setAttribute('position', p.x + ' ' + p.y + ' ' + p.z);

        // Remove if fallen too far
        if (p.y < -10) {
          world.removeBody(b.body);
          if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
          bodies.splice(i, 1);
          i--;
        }
      }

      requestAnimationFrame(physicsTick);
    }

    // Wait for scene loaded
    scene.addEventListener('loaded', function() {
      physicsTick();
    });
    // Fallback
    setTimeout(physicsTick, 2000);

    // Hide instructions after first toss
    scene.addEventListener('touchstart', function() {
      setTimeout(function() {
        document.getElementById('instructions').style.opacity = '0';
      }, 2000);
    }, { once: true });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
