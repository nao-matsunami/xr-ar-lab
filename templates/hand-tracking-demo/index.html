<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Hand Tracking — MediaPipe</title>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }

    #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    #input-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    #overlay-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      transform: scaleX(-1);
    }
    #effects-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    #gesture-label {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 10px 24px; border-radius: 25px; font-size: 16px;
      font-weight: 700; pointer-events: none; transition: all 0.2s;
      min-height: 44px; display: flex; align-items: center;
    }
    #fps-display {
      position: fixed; top: 20px; right: 20px; z-index: 999;
      background: rgba(0,0,0,0.5); color: #0f0; padding: 6px 12px;
      border-radius: 8px; font-size: 12px; font-family: monospace;
    }
    #back-btn {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 12px 24px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    #loading-msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 1000; color: #fff; font-size: 16px; text-align: center;
      line-height: 1.8;
    }
    #loading-msg .spinner {
      display: inline-block; width: 30px; height: 30px;
      border: 3px solid rgba(255,255,255,0.3); border-top-color: #00f0ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Help overlay */
    #help-btn {
      position: fixed; top: 20px; left: 20px; z-index: 998;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #help-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9998; background: rgba(0,0,0,0.85);
      align-items: center; justify-content: center;
    }
    #help-overlay.visible { display: flex; }
    #help-content {
      background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
      border-radius: 16px; padding: 24px; max-width: 320px; width: 90%;
      color: #fff; font-family: sans-serif;
    }
    #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
    #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
    #help-content .row { font-size: 13px; line-height: 1.8; }
    #help-content .row b { color: #00f0ff; }
    #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 2; color: #ccc; }
    #help-content .powered { font-size: 11px; color: #666; margin-top: 12px; text-align: center; }
    #help-content .close-help {
      margin-top: 16px; width: 100%; padding: 10px; border: none;
      border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Error overlay */
    #error-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center; padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Error Overlay -->
  <div id="error-overlay">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <!-- Help -->
  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>MediaPipe Hand Tracking</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> カメラに手をかざす</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>手の骨格リアルタイム認識</li>
        <li>&#x270C;&#xFE0F; ピース → 星エフェクト</li>
        <li>&#x1F44D; サムズアップ → Good!</li>
        <li>&#x270A; グー → シェイク</li>
        <li>&#x1F590;&#xFE0F; パー → オーラ</li>
        <li>&#x261D;&#xFE0F; 人差し指 → 軌跡</li>
      </ul>
      <div class="powered">Powered by Google MediaPipe</div>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-msg">
    <div class="spinner"></div><br>
    MediaPipe Hands を読み込み中...
  </div>

  <!-- Video + Canvas -->
  <div id="video-container">
    <video id="input-video" playsinline></video>
    <canvas id="overlay-canvas"></canvas>
    <canvas id="effects-canvas"></canvas>
  </div>

  <div id="gesture-label">手をかざしてください</div>
  <div id="fps-display">FPS: --</div>
  <a id="back-btn" href="/templates/">デモ一覧に戻る</a>

  <script>
    // === Error handling ===
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このデモはiOS Safari またはAndroid Chromeでご利用ください。' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }

    // === Help overlay ===
    function toggleHelp() {
      document.getElementById('help-overlay').classList.toggle('visible');
    }
    setTimeout(function() {
      document.getElementById('help-overlay').classList.add('visible');
      setTimeout(function() {
        document.getElementById('help-overlay').classList.remove('visible');
      }, 5000);
    }, 2000);
    document.addEventListener('touchstart', function _h() {
      document.getElementById('help-overlay').classList.remove('visible');
      document.removeEventListener('touchstart', _h);
    });

    // === Main ===
    const videoEl = document.getElementById('input-video');
    const overlayCanvas = document.getElementById('overlay-canvas');
    const effectsCanvas = document.getElementById('effects-canvas');
    const overlayCtx = overlayCanvas.getContext('2d');
    const effectsCtx = effectsCanvas.getContext('2d');
    const gestureLabel = document.getElementById('gesture-label');
    const fpsDisplay = document.getElementById('fps-display');

    // FPS tracking
    let frameCount = 0;
    let lastFpsTime = performance.now();

    // Trail history for point gesture
    let trails = [];
    const MAX_TRAIL = 30;

    // Shake effect
    let shakeIntensity = 0;

    // Star particles for peace gesture
    let stars = [];

    // Gesture detection
    function detectGesture(lm) {
      const indexUp = lm[8].y < lm[6].y;
      const middleUp = lm[12].y < lm[10].y;
      const ringDown = lm[16].y > lm[14].y;
      const pinkyDown = lm[20].y > lm[18].y;
      const thumbUp = lm[4].y < lm[3].y;
      const allUp = indexUp && middleUp && !ringDown && !pinkyDown;

      if (indexUp && middleUp && ringDown && pinkyDown) return 'peace';
      if (thumbUp && !indexUp && !middleUp && ringDown && pinkyDown) return 'thumbsup';
      if (!indexUp && !middleUp && !thumbUp && ringDown && pinkyDown) return 'fist';
      if (allUp && thumbUp) return 'open';
      if (indexUp && !middleUp && ringDown && pinkyDown) return 'point';
      return 'none';
    }

    const GESTURE_LABELS = {
      peace: '✌️ ピース',
      thumbsup: '👍 Good!',
      fist: '✊ グー',
      open: '🖐 パー',
      point: '☝️ ポイント',
      none: '...',
    };

    function onResults(results) {
      // FPS
      frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        fpsDisplay.textContent = 'FPS: ' + frameCount;
        frameCount = 0;
        lastFpsTime = now;
      }

      const W = overlayCanvas.width;
      const H = overlayCanvas.height;

      // Clear overlay
      overlayCtx.clearRect(0, 0, W, H);

      // Fade effects canvas
      effectsCtx.fillStyle = 'rgba(0,0,0,0.08)';
      effectsCtx.fillRect(0, 0, W, H);

      // Apply shake
      if (shakeIntensity > 0) {
        document.getElementById('video-container').style.transform =
          `translate(${(Math.random()-0.5)*shakeIntensity}px, ${(Math.random()-0.5)*shakeIntensity}px)`;
        shakeIntensity *= 0.9;
        if (shakeIntensity < 0.5) {
          shakeIntensity = 0;
          document.getElementById('video-container').style.transform = '';
        }
      }

      // Update stars
      stars = stars.filter(s => {
        s.x += s.vx;
        s.y += s.vy;
        s.life -= 0.02;
        if (s.life <= 0) return false;
        effectsCtx.save();
        effectsCtx.globalAlpha = s.life;
        effectsCtx.fillStyle = s.color;
        effectsCtx.font = `${s.size}px sans-serif`;
        effectsCtx.fillText('*', s.x * W, s.y * H);
        effectsCtx.restore();
        return true;
      });

      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        gestureLabel.textContent = '手をかざしてください';
        return;
      }

      const handColors = ['#4FC3F7', '#EF5350']; // left: blue, right: red

      results.multiHandLandmarks.forEach((landmarks, handIdx) => {
        const handedness = results.multiHandedness[handIdx];
        const isRight = handedness.label === 'Right';
        const color = handColors[isRight ? 1 : 0];

        // Draw skeleton using drawingUtils
        drawConnectors(overlayCtx, landmarks, HAND_CONNECTIONS, { color: color, lineWidth: 3 });
        drawLandmarks(overlayCtx, landmarks, { color: '#fff', lineWidth: 1, radius: 3 });

        // Gesture detection
        const gesture = detectGesture(landmarks);

        if (handIdx === 0) {
          gestureLabel.textContent = GESTURE_LABELS[gesture] || '...';
        }

        // Gesture effects
        const palmX = landmarks[0].x;
        const palmY = landmarks[0].y;
        const indexTip = landmarks[8];

        switch (gesture) {
          case 'peace':
            // Star particles from fingertips
            for (let i = 0; i < 3; i++) {
              stars.push({
                x: landmarks[8].x + (Math.random()-0.5)*0.05,
                y: landmarks[8].y + (Math.random()-0.5)*0.05,
                vx: (Math.random()-0.5)*0.01,
                vy: -Math.random()*0.01 - 0.005,
                life: 1,
                size: 12 + Math.random() * 16,
                color: ['#FFD700','#FF69B4','#00FFFF','#7FFF00'][Math.floor(Math.random()*4)],
              });
            }
            break;

          case 'thumbsup':
            // "Good!" text near thumb
            effectsCtx.save();
            effectsCtx.font = 'bold 36px sans-serif';
            effectsCtx.fillStyle = '#FFD700';
            effectsCtx.shadowColor = '#FFD700';
            effectsCtx.shadowBlur = 15;
            effectsCtx.fillText('Good!', landmarks[4].x * W - 40, landmarks[4].y * H - 20);
            effectsCtx.restore();
            break;

          case 'fist':
            // Shake effect
            shakeIntensity = 12;
            break;

          case 'open':
            // Aura around hand
            effectsCtx.save();
            const cx = palmX * W;
            const cy = palmY * H;
            const r = 80 + Math.sin(now * 0.005) * 20;
            const grad = effectsCtx.createRadialGradient(cx, cy, 10, cx, cy, r);
            grad.addColorStop(0, `rgba(0,240,255,0.4)`);
            grad.addColorStop(0.5, `rgba(0,240,255,0.15)`);
            grad.addColorStop(1, `rgba(0,240,255,0)`);
            effectsCtx.fillStyle = grad;
            effectsCtx.fillRect(cx - r, cy - r, r * 2, r * 2);
            effectsCtx.restore();
            break;

          case 'point':
            // Trail from index finger
            trails.push({ x: indexTip.x, y: indexTip.y, t: now });
            if (trails.length > MAX_TRAIL) trails.shift();
            effectsCtx.save();
            effectsCtx.strokeStyle = color;
            effectsCtx.lineWidth = 4;
            effectsCtx.lineCap = 'round';
            effectsCtx.beginPath();
            trails.forEach((pt, i) => {
              const px = pt.x * W;
              const py = pt.y * H;
              if (i === 0) effectsCtx.moveTo(px, py);
              else effectsCtx.lineTo(px, py);
            });
            effectsCtx.globalAlpha = 0.8;
            effectsCtx.stroke();
            effectsCtx.restore();
            break;
        }
      });
    }

    // === Initialize MediaPipe Hands ===
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5,
    });
    hands.onResults(onResults);

    // === Start Camera ===
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        videoEl.srcObject = stream;
        await videoEl.play();

        // Set canvas sizes
        overlayCanvas.width = videoEl.videoWidth || 640;
        overlayCanvas.height = videoEl.videoHeight || 480;
        effectsCanvas.width = overlayCanvas.width;
        effectsCanvas.height = overlayCanvas.height;

        document.getElementById('loading-msg').style.display = 'none';

        // Start processing
        const camera = new Camera(videoEl, {
          onFrame: async () => {
            await hands.send({ image: videoEl });
          },
          width: 640,
          height: 480,
        });
        camera.start();
      } catch (err) {
        console.error('Camera error:', err);
        showError('camera');
      }
    }

    startCamera();
  </script>
</body>
</html>
