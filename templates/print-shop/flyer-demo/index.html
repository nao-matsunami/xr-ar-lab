<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Flyer AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../../lib/xr.js" data-preload-chunks="slam"></script>

  <script>
    var onxrloaded = function() {
      XR8.XrController.configure({
        imageTargetData: [{
          imagePath: '../../image-target-demo/image-targets/sample-target-1_luminance.jpg',
          metadata: null,
          name: 'sample-target-1',
          type: 'PLANAR',
          properties: {
            left: 0, top: 0, width: 995, height: 1326,
            isRotated: false, originalWidth: 995, originalHeight: 1326,
          },
          resources: {
            originalImage: 'sample-target-1_original.jpg',
            croppedImage: 'sample-target-1_cropped.jpg',
            thumbnailImage: 'sample-target-1_thumbnail.jpg',
            luminanceImage: 'sample-target-1_luminance.jpg',
          },
          created: 1772601126877,
          updated: 1772601126877,
        }],
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    function capturePhoto() {
      var scene = document.querySelector('a-scene');
      var canvas = scene.canvas;
      scene.renderer.render(scene.object3D, scene.camera);
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'flyer-ar-' + Date.now() + '.jpg';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.9);
    }
  </script>

  <script>
    // Runner silhouette canvas texture
    AFRAME.registerComponent('runner-sprite', {
      schema: { phase: { type: 'number', default: 0 } },
      init: function() {
        var canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 128;
        this._canvas = canvas;
        this._ctx = canvas.getContext('2d');
        this._phase = this.data.phase;
        this._tex = new AFRAME.THREE.CanvasTexture(canvas);
        this.el.getObject3D('mesh').material.map = this._tex;
        this.el.getObject3D('mesh').material.transparent = true;
        this.el.getObject3D('mesh').material.alphaTest = 0.1;
        this._time = 0;
      },
      tick: function(t, dt) {
        this._time += dt * 0.003;
        var ctx = this._ctx;
        var w = 64, h = 128;
        ctx.clearRect(0, 0, w, h);

        // Running pose
        var armAngle = Math.sin(this._time * 4 + this._phase) * 0.7;
        var legAngle = Math.sin(this._time * 4 + this._phase + Math.PI) * 0.8;

        ctx.fillStyle = '#222222';
        ctx.strokeStyle = '#222222';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';

        // Head
        ctx.beginPath();
        ctx.arc(32, 22, 10, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.beginPath();
        ctx.moveTo(32, 32);
        ctx.lineTo(32, 70);
        ctx.stroke();

        // Arms
        ctx.beginPath();
        ctx.moveTo(32, 42);
        ctx.lineTo(32 + Math.sin(armAngle) * 18, 42 + Math.cos(armAngle) * 18);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(32, 42);
        ctx.lineTo(32 - Math.sin(armAngle) * 18, 42 + Math.cos(armAngle) * 18);
        ctx.stroke();

        // Legs
        ctx.beginPath();
        ctx.moveTo(32, 70);
        ctx.lineTo(32 + Math.sin(legAngle) * 20, 70 + Math.cos(legAngle) * 20);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(32, 70);
        ctx.lineTo(32 - Math.sin(legAngle) * 20, 70 + Math.cos(legAngle) * 20);
        ctx.stroke();

        this._tex.needsUpdate = true;
      }
    });

    // Countdown timer
    var timerSeconds = 180;

    AFRAME.registerComponent('countdown-timer', {
      init: function() {
        this._el = this.el;
        this._interval = setInterval(function() {
          timerSeconds--;
          if (timerSeconds <= 0) {
            timerSeconds = 180;
            triggerExplosion();
          }
          var m = Math.floor(timerSeconds / 60);
          var s = timerSeconds % 60;
          document.querySelector('#timer-text').setAttribute('value',
            m + ':' + (s < 10 ? '0' : '') + s);
        }, 1000);
      }
    });

    function triggerExplosion() {
      var target = document.getElementById('flyer-target');
      for (var i = 0; i < 20; i++) {
        var p = document.createElement('a-sphere');
        p.setAttribute('radius', '0.01');
        p.setAttribute('position', '0 0.15 0');
        var col = Math.random() > 0.5 ? '#ff2200' : '#ffaa00';
        p.setAttribute('material', 'color: ' + col + '; emissive: ' + col + '; emissiveIntensity: 0.8; transparent: true; opacity: 1; shader: standard');
        var tx = (Math.random() - 0.5) * 0.4;
        var ty = 0.1 + Math.random() * 0.3;
        var tz = (Math.random() - 0.5) * 0.4;
        p.setAttribute('animation__pos', 'property: position; to: ' + tx + ' ' + ty + ' ' + tz + '; dur: 600; easing: easeOutQuad');
        p.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: 600; easing: easeInQuad');
        target.appendChild(p);
        (function(el) { setTimeout(function() { try { target.removeChild(el); } catch(e){} }, 700); })(p);
      }
    }
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 998;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    #capture-btn {
      position: fixed; top: 70px; right: 20px; z-index: 998;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<body>
  <a id="back-btn" href="../">&#x2190;</a>
  <button id="capture-btn" onclick="capturePhoto()">&#x1F4F7;</button>

  <a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="disableWorldTracking: true; allowedDevices: any">

    <a-camera id="camera" position="0 4 10"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

    <xrextras-named-image-target name="sample-target-1">
      <a-entity id="flyer-target" countdown-timer>

        <!-- Clock face -->
        <a-cylinder radius="0.1" height="0.005" position="0 0.25 0"
          material="color: #1a1a1a; shader: standard; roughness: 0.3; metalness: 0.5"
          animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-cylinder>

        <!-- Clock rim -->
        <a-torus radius="0.1" radius-tubular="0.004" position="0 0.253 0"
          rotation="90 0 0"
          material="color: #cc0000; shader: standard; roughness: 0.2; metalness: 0.7; emissive: #cc0000; emissiveIntensity: 0.3">
        </a-torus>

        <!-- 12 tick marks on clock -->
        <a-cylinder radius="0.003" height="0.015" position="0 0.253 -0.088" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.5"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="0.044 0.253 -0.076" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="0.076 0.253 -0.044" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="0.088 0.253 0" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.5"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="0.076 0.253 0.044" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="0.044 0.253 0.076" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="0 0.253 0.088" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.5"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="-0.044 0.253 0.076" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="-0.076 0.253 0.044" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="-0.088 0.253 0" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.5"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="-0.076 0.253 -0.044" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>
        <a-cylinder radius="0.003" height="0.015" position="-0.044 0.253 -0.076" color="#888" material="emissive: #888; emissiveIntensity: 0.3"></a-cylinder>

        <!-- Timer text (numbers only) -->
        <a-text id="timer-text" value="3:00" color="#cc0000" align="center"
          font="exo2bold" width="0.8" position="0 0.256 0" rotation="-90 0 0"
          material="emissive: #cc0000; emissiveIntensity: 0.4">
        </a-text>

        <!-- Runner silhouettes (Canvas-driven) -->
        <a-plane width="0.04" height="0.08" position="-0.16 0.04 0"
          material="transparent: true; side: double; shader: flat"
          runner-sprite="phase: 0"
          animation="property: position; from: -0.2 0.04 0; to: 0.2 0.04 0; dur: 3000; loop: true; easing: linear">
        </a-plane>
        <a-plane width="0.04" height="0.08" position="-0.1 0.04 0.02"
          material="transparent: true; side: double; shader: flat"
          runner-sprite="phase: 1.2"
          animation="property: position; from: -0.22 0.04 0.02; to: 0.18 0.04 0.02; dur: 3400; loop: true; easing: linear">
        </a-plane>
        <a-plane width="0.04" height="0.08" position="0.05 0.04 -0.01"
          material="transparent: true; side: double; shader: flat"
          runner-sprite="phase: 2.5"
          animation="property: position; from: -0.18 0.04 -0.01; to: 0.22 0.04 -0.01; dur: 2800; loop: true; easing: linear">
        </a-plane>
        <a-plane width="0.035" height="0.07" position="0.1 0.035 0.015"
          material="transparent: true; side: double; shader: flat"
          runner-sprite="phase: 3.8"
          animation="property: position; from: -0.24 0.035 0.015; to: 0.16 0.035 0.015; dur: 3800; loop: true; easing: linear">
        </a-plane>

        <!-- Red accent ring at base -->
        <a-torus radius="0.15" radius-tubular="0.003" position="0 0.005 0"
          rotation="90 0 0"
          material="color: #cc0000; emissive: #cc0000; emissiveIntensity: 0.5; transparent: true; opacity: 0.6"
          animation="property: scale; from: 0.8 0.8 0.8; to: 1.1 1.1 1.1; loop: true; dir: alternate; dur: 2000; easing: easeInOutSine">
        </a-torus>

      </a-entity>
    </xrextras-named-image-target>

  </a-scene>

  <script>
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;color:#fff;background:#000;text-align:center;padding:20px;">HTTPS required</div>';
    }
  </script>
</body>
</html>
