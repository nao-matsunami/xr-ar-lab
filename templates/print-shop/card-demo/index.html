<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Card AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../../lib/xr.js" data-preload-chunks="slam"></script>

  <script>
    var onxrloaded = function() {
      XR8.XrController.configure({
        imageTargetData: [{
          imagePath: 'image-targets/card-target_luminance.png',
          metadata: null,
          name: 'card-target',
          type: 'PLANAR',
          properties: {
            left: 0, top: 0, width: 768, height: 1024,
            isRotated: false, originalWidth: 768, originalHeight: 1024,
          },
          resources: {
            originalImage: 'card-target_original.png',
            croppedImage: 'card-target_cropped.png',
            thumbnailImage: 'card-target_thumbnail.png',
            luminanceImage: 'card-target_luminance.png',
          },
          created: 1772899537105,
          updated: 1772899537105,
        }],
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    function capturePhoto() {
      var scene = document.querySelector('a-scene');
      var canvas = scene.canvas;
      scene.renderer.render(scene.object3D, scene.camera);
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'card-ar-' + Date.now() + '.jpg';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.9);
    }

    // Globe / Moon toggle
    var isEarth = true;
    function toggleGlobe() {
      var globe = document.querySelector('#globe');
      var clouds = document.querySelector('#clouds');
      var btn = document.getElementById('toggle-btn');
      if (isEarth) {
        globe.setAttribute('material', 'src', '#moon-tex');
        globe.setAttribute('material', 'roughness', '1');
        globe.setAttribute('material', 'metalness', '0');
        clouds.setAttribute('visible', false);
        btn.textContent = '\uD83C\uDF0D';
      } else {
        globe.setAttribute('material', 'src', '#earth-tex');
        globe.setAttribute('material', 'roughness', '0.8');
        globe.setAttribute('material', 'metalness', '0');
        clouds.setAttribute('visible', true);
        btn.textContent = '\uD83C\uDF15';
      }
      isEarth = !isEarth;
    }

    // BGM
    var bgmStarted = false;
    function startBGM() {
      var bgm = document.querySelector('#bgm');
      if (!bgm || bgmStarted) return;
      bgm.volume = 0.6;
      bgm.loop = true;
      bgm.play().then(function() { bgmStarted = true; }).catch(function() {});
    }
    function stopBGM() {
      var bgm = document.querySelector('#bgm');
      if (bgm) bgm.pause();
    }
    document.addEventListener('touchstart', function _bt() {
      startBGM();
      document.removeEventListener('touchstart', _bt);
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 998;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    #capture-btn {
      position: fixed; top: 70px; right: 20px; z-index: 998;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #toggle-btn {
      position: fixed; bottom: 40px; right: 30px; z-index: 998;
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
      font-size: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
  </style>
</head>

<body>
  <a id="back-btn" href="../">&#x2190;</a>
  <button id="capture-btn" onclick="capturePhoto()">&#x1F4F7;</button>
  <button id="toggle-btn" onclick="toggleGlobe()">&#x1F315;</button>

  <a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="disableWorldTracking: true; allowedDevices: any">

    <a-assets>
      <img id="earth-tex" crossorigin="anonymous" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/planets/earth_atmos_2048.jpg">
      <img id="earth-clouds" crossorigin="anonymous" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/planets/earth_clouds_1024.png">
      <img id="moon-tex" crossorigin="anonymous" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/planets/moon_1024.jpg">
      <audio id="bgm" crossorigin="anonymous" src="https://cdn.pixabay.com/audio/2023/03/14/audio_a75f7f1d4e.mp3" preload="auto"></audio>
    </a-assets>

    <a-camera id="camera" position="0 4 10"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <xrextras-named-image-target name="card-target">

      <!-- Spotlight from card surface upward -->
      <a-light type="spot" color="#ffffff" intensity="3" angle="40" penumbra="0.6"
        position="0 0.01 0" target="#globe"></a-light>
      <a-light type="ambient" color="#111133" intensity="0.3"></a-light>

      <!-- Earth globe -->
      <a-sphere id="globe" radius="0.06" position="0 0.12 0"
        material="src: #earth-tex; shader: standard; metalness: 0; roughness: 0.8"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">

        <!-- Cloud layer -->
        <a-sphere id="clouds" radius="0.062"
          material="src: #earth-clouds; shader: standard; transparent: true; opacity: 0.4; side: double"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
        </a-sphere>
      </a-sphere>

    </xrextras-named-image-target>

  </a-scene>

  <script>
    var targetEl = document.querySelector('[name="card-target"]');
    if (targetEl) {
      targetEl.addEventListener('targetFound', function() { startBGM(); });
      targetEl.addEventListener('targetLost', function() { stopBGM(); });
    }
  </script>

  <script>
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;color:#fff;background:#000;text-align:center;padding:20px;">HTTPS required</div>';
    }
  </script>
</body>
</html>
