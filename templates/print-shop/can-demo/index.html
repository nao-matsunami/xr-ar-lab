<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Can AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../../lib/xr.js" data-preload-chunks="slam"></script>

  <script>
    var onxrloaded = function() {
      XR8.XrController.configure({
        imageTargetData: [{
          imagePath: '../../image-target-demo/image-targets/sample-target-1_luminance.jpg',
          metadata: null,
          name: 'sample-target-1',
          type: 'PLANAR',
          properties: {
            left: 0, top: 0, width: 995, height: 1326,
            isRotated: false, originalWidth: 995, originalHeight: 1326,
          },
          resources: {
            originalImage: 'sample-target-1_original.jpg',
            croppedImage: 'sample-target-1_cropped.jpg',
            thumbnailImage: 'sample-target-1_thumbnail.jpg',
            luminanceImage: 'sample-target-1_luminance.jpg',
          },
          created: 1772601126877,
          updated: 1772601126877,
        }],
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    function capturePhoto() {
      var scene = document.querySelector('a-scene');
      var canvas = scene.canvas;
      scene.renderer.render(scene.object3D, scene.camera);
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'can-ar-' + Date.now() + '.jpg';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.9);
    }
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 998;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    #capture-btn {
      position: fixed; top: 70px; right: 20px; z-index: 998;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<body>
  <a id="back-btn" href="../">&#x2190;</a>
  <button id="capture-btn" onclick="capturePhoto()">&#x1F4F7;</button>

  <a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="disableWorldTracking: true; allowedDevices: any">

    <a-camera id="camera" position="0 4 10"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <xrextras-named-image-target name="sample-target-1">
      <a-entity id="can-target">

        <!-- Point light (golden glow from above) -->
        <a-light type="point" color="#ffd700" intensity="2" position="0 0.3 0" distance="1" decay="2"></a-light>
        <a-light type="ambient" color="#111111" intensity="0.5"></a-light>

        <!-- Gold aura -->
        <a-sphere radius="0.12" position="0 0.15 0"
          material="color: #ffd700; opacity: 0.12; transparent: true; shader: standard; roughness: 0.9; metalness: 0.2; side: back"
          animation="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; loop: true; dur: 1200; dir: alternate; easing: easeInOutSine">
        </a-sphere>

        <!-- Star burst: small golden octahedrons radiating outward -->
        <a-octahedron radius="0.012" position="0 0.15 0" color="#ffd700"
          material="shader: standard; metalness: 0.8; roughness: 0.2; emissive: #ffd700; emissiveIntensity: 0.6"
          animation="property: position; to: 0.15 0.25 0.05; dur: 1800; loop: true; easing: easeOutQuad"
          animation__fade="property: material.opacity; from: 1; to: 0; dur: 1800; loop: true; easing: easeInQuad"
          animation__rot="property: rotation; to: 360 720 0; dur: 1800; loop: true; easing: linear">
        </a-octahedron>
        <a-octahedron radius="0.01" position="0 0.15 0" color="#ffd700"
          material="shader: standard; metalness: 0.8; roughness: 0.2; emissive: #ffd700; emissiveIntensity: 0.6; transparent: true"
          animation="property: position; to: -0.12 0.3 -0.08; dur: 2200; delay: 300; loop: true; easing: easeOutQuad"
          animation__fade="property: material.opacity; from: 1; to: 0; dur: 2200; delay: 300; loop: true; easing: easeInQuad"
          animation__rot="property: rotation; to: -360 360 180; dur: 2200; delay: 300; loop: true; easing: linear">
        </a-octahedron>
        <a-octahedron radius="0.014" position="0 0.15 0" color="#ffcc00"
          material="shader: standard; metalness: 0.8; roughness: 0.2; emissive: #ffcc00; emissiveIntensity: 0.6; transparent: true"
          animation="property: position; to: 0.1 0.35 -0.1; dur: 2000; delay: 600; loop: true; easing: easeOutQuad"
          animation__fade="property: material.opacity; from: 1; to: 0; dur: 2000; delay: 600; loop: true; easing: easeInQuad"
          animation__rot="property: rotation; to: 180 -360 360; dur: 2000; delay: 600; loop: true; easing: linear">
        </a-octahedron>
        <a-octahedron radius="0.011" position="0 0.15 0" color="#ffd700"
          material="shader: standard; metalness: 0.8; roughness: 0.2; emissive: #ffd700; emissiveIntensity: 0.6; transparent: true"
          animation="property: position; to: -0.08 0.28 0.12; dur: 1900; delay: 900; loop: true; easing: easeOutQuad"
          animation__fade="property: material.opacity; from: 1; to: 0; dur: 1900; delay: 900; loop: true; easing: easeInQuad"
          animation__rot="property: rotation; to: 720 360 -180; dur: 1900; delay: 900; loop: true; easing: linear">
        </a-octahedron>

      </a-entity>
    </xrextras-named-image-target>

  </a-scene>

  <!-- Foam particles (JS generated) -->
  <script>
    var canTarget = document.getElementById('can-target');
    function createFoam() {
      var s = document.createElement('a-sphere');
      var x = (Math.random() - 0.5) * 0.06;
      var z = (Math.random() - 0.5) * 0.06;
      var r = 0.006 + Math.random() * 0.008;
      s.setAttribute('radius', r.toString());
      s.setAttribute('position', x + ' 0.08 ' + z);
      s.setAttribute('material', 'color: #fffef0; opacity: 0.7; transparent: true; shader: standard; roughness: 0.9; metalness: 0');
      var toY = 0.25 + Math.random() * 0.15;
      var drift = x + (Math.random() - 0.5) * 0.04;
      var dur = 1800 + Math.random() * 800;
      s.setAttribute('animation__rise', 'property: position; to: ' + drift + ' ' + toY + ' ' + z + '; dur: ' + dur + '; easing: easeOutQuad');
      s.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: ' + dur + '; easing: easeInQuad');
      s.setAttribute('animation__grow', 'property: scale; from: 0.5 0.5 0.5; to: 1.3 1.3 1.3; dur: ' + dur + '; easing: easeOutQuad');
      canTarget.appendChild(s);
      setTimeout(function() { try { canTarget.removeChild(s); } catch(e){} }, dur + 100);
    }
    setInterval(createFoam, 200);
  </script>

  <script>
    function showError(type) {
      var m = {
        camera: { i: '\uD83D\uDCF7', t: 'Camera required', m: 'Allow camera access in browser settings.' },
        browser: { i: '\uD83C\uDF10', t: 'Unsupported browser', m: 'Use iOS Safari or Android Chrome.' },
        https: { i: '\uD83D\uDD12', t: 'HTTPS required', m: 'Access via https://xr-ar-lab.netlify.app' }
      }[type] || { i: '\uD83C\uDF10', t: 'Error', m: '' };
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') showError('https');
  </script>
</body>
</html>
