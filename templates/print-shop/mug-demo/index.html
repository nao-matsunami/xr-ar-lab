<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Mug AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../../lib/xr.js" data-preload-chunks="slam"></script>

  <script>
    var onxrloaded = function() {
      XR8.XrController.configure({
        imageTargetData: [{
          imagePath: '../../image-target-demo/image-targets/sample-target-2_luminance.jpg',
          metadata: null,
          name: 'sample-target-2',
          type: 'PLANAR',
          properties: {
            left: 0, top: 0, width: 980, height: 1307,
            isRotated: false, originalWidth: 980, originalHeight: 1307,
          },
          resources: {
            originalImage: 'sample-target-2_original.jpg',
            croppedImage: 'sample-target-2_cropped.jpg',
            thumbnailImage: 'sample-target-2_thumbnail.jpg',
            luminanceImage: 'sample-target-2_luminance.jpg',
          },
          created: 1772601126925,
          updated: 1772601126925,
        }],
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    function capturePhoto() {
      var scene = document.querySelector('a-scene');
      var canvas = scene.canvas;
      scene.renderer.render(scene.object3D, scene.camera);
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'mug-ar-' + Date.now() + '.jpg';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.9);
    }

    // Latte art canvas texture (heart shape)
    AFRAME.registerComponent('latte-art', {
      init: function() {
        var canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        var ctx = canvas.getContext('2d');

        // Coffee background
        ctx.fillStyle = '#3d1a00';
        ctx.beginPath();
        ctx.arc(64, 64, 60, 0, Math.PI * 2);
        ctx.fill();

        // Latte art heart (cream colored)
        ctx.fillStyle = '#f5e6d3';
        ctx.beginPath();
        // Heart shape
        ctx.moveTo(64, 85);
        ctx.bezierCurveTo(64, 80, 44, 55, 44, 48);
        ctx.bezierCurveTo(44, 38, 54, 35, 64, 45);
        ctx.bezierCurveTo(74, 35, 84, 38, 84, 48);
        ctx.bezierCurveTo(84, 55, 64, 80, 64, 85);
        ctx.fill();

        // Subtle swirl lines
        ctx.strokeStyle = '#e8d4be';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(54, 55, 8, 0.5, 2.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(74, 55, 8, 0.8, 2.8);
        ctx.stroke();

        var tex = new AFRAME.THREE.CanvasTexture(canvas);
        var mesh = this.el.getObject3D('mesh');
        if (mesh) {
          mesh.material.map = tex;
          mesh.material.needsUpdate = true;
        }
      }
    });

    // Camera angle detection for latte art visibility
    AFRAME.registerComponent('latte-angle-check', {
      tick: function() {
        var cam = document.querySelector('#camera');
        var latte = document.querySelector('#latte-art');
        if (!cam || !latte) return;
        var rot = cam.getAttribute('rotation');
        // Show latte art when looking down (pitch > 50)
        latte.setAttribute('visible', rot && rot.x > 50);
      }
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 998;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    #capture-btn {
      position: fixed; top: 70px; right: 20px; z-index: 998;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<body>
  <a id="back-btn" href="../">&#x2190;</a>
  <button id="capture-btn" onclick="capturePhoto()">&#x1F4F7;</button>

  <a-scene
    latte-angle-check
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="disableWorldTracking: true; allowedDevices: any">

    <a-camera id="camera" position="0 4 10"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <!-- Warm lighting -->
    <a-light type="point" color="#ff8c00" intensity="1.5" position="0 0.3 0.1" distance="1" decay="2"></a-light>
    <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
    <a-light type="directional" color="#ffeedd" intensity="0.6" position="1 2 1"></a-light>

    <xrextras-named-image-target name="sample-target-2">
      <a-entity id="mug-target">

        <!-- Mug body (cylinder, open top) -->
        <a-cylinder radius="0.045" height="0.07" position="0 0.065 0"
          material="color: #f5f5f0; shader: standard; roughness: 0.6; metalness: 0.05; side: double"
          open-ended="true">
        </a-cylinder>

        <!-- Mug bottom -->
        <a-cylinder radius="0.045" height="0.004" position="0 0.032 0"
          material="color: #e8e8e0; shader: standard; roughness: 0.5; metalness: 0.05">
        </a-cylinder>

        <!-- Mug handle -->
        <a-torus radius="0.03" radius-tubular="0.006" rotation="0 90 0"
          position="0.055 0.065 0"
          material="color: #f5f5f0; shader: standard; roughness: 0.6; metalness: 0.05">
        </a-torus>

        <!-- Coffee surface -->
        <a-cylinder radius="0.042" height="0.003" position="0 0.095 0"
          material="color: #3d1a00; shader: standard; roughness: 0.8; metalness: 0.1">
        </a-cylinder>

        <!-- Latte art (visible when looking from above) -->
        <a-circle id="latte-art" radius="0.04" position="0 0.098 0"
          rotation="-90 0 0"
          material="shader: flat; transparent: true; side: double"
          latte-art
          visible="false">
        </a-circle>

        <!-- Warm glow around mug -->
        <a-sphere radius="0.09" position="0 0.065 0"
          material="color: #ff6600; opacity: 0.06; transparent: true; shader: standard; roughness: 1; metalness: 0; side: back"
          animation="property: scale; from: 1 1 1; to: 1.15 1.15 1.15; loop: true; dir: alternate; dur: 2000; easing: easeInOutSine">
        </a-sphere>

      </a-entity>
    </xrextras-named-image-target>

  </a-scene>

  <!-- Steam particles -->
  <script>
    var mugTarget = document.getElementById('mug-target');
    function createSteam() {
      var s = document.createElement('a-sphere');
      var x = (Math.random() - 0.5) * 0.03;
      var z = (Math.random() - 0.5) * 0.03;
      var r = 0.006 + Math.random() * 0.008;
      s.setAttribute('radius', r.toString());
      s.setAttribute('position', x + ' 0.1 ' + z);
      s.setAttribute('material', 'color: #ffffff; opacity: 0.45; transparent: true; shader: standard; roughness: 1; metalness: 0');

      var sway = x + Math.sin(Math.random() * 6.28) * 0.015;
      var toY = 0.2 + Math.random() * 0.08;
      var dur = 1800 + Math.random() * 600;

      s.setAttribute('animation__rise', 'property: position; to: ' + sway + ' ' + toY + ' ' + z + '; dur: ' + dur + '; easing: easeOutQuad');
      s.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: ' + dur + '; easing: easeInQuad');
      s.setAttribute('animation__grow', 'property: scale; from: 0.6 0.6 0.6; to: 1.8 1.8 1.8; dur: ' + dur + '; easing: easeOutQuad');
      mugTarget.appendChild(s);
      setTimeout(function() { try { mugTarget.removeChild(s); } catch(e){} }, dur + 100);
    }
    setInterval(createSteam, 250);
  </script>

  <script>
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;color:#fff;background:#000;text-align:center;padding:20px;">HTTPS required</div>';
    }
  </script>
</body>
</html>
