<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>3D Animation AR Demo</title>

  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- A-Frame Extras (animation-mixer) -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none;
    }
    #anim-controls {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: none; gap: 8px; flex-wrap: wrap; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #anim-controls button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    #anim-controls button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #anim-controls button:active { transform: scale(0.95); }
    #anim-label {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,240,255,0.15); color: #00f0ff;
      padding: 6px 14px; border-radius: 12px; font-size: 14px;
      font-family: sans-serif; font-weight: 600; display: none;
      border: 1px solid rgba(0,240,255,0.3);
    }
  </style>
</head>
<body>

  <div id="instructions">地面をタップしてキャラクターを配置</div>
  <div id="anim-label"></div>
  <div id="anim-controls">
    <button class="active" onclick="playAnim('idle', 'Idle')">😐 Idle</button>
    <button onclick="playAnim('pockets', 'Pockets')">🚶 Pockets</button>
    <button onclick="playAnim('hiphop', 'HipHop')">💃 HipHop</button>
    <button onclick="playAnim('chicken', 'Chicken')">🐔 Chicken</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-assets>
      <a-asset-item id="characterModel" src="./assets/mixamo-animated-lowpoly.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" intensity="0.8" position="1 4 2"
      light="castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>
  </a-scene>

  <script>
    let model = null;
    let placed = false;
    let currentAnim = 'idle';

    document.getElementById('ground').addEventListener('click', (event) => {
      if (placed) return;
      placed = true;

      const point = event.detail.intersection.point;

      model = document.createElement('a-entity');
      model.setAttribute('position', point);
      model.setAttribute('gltf-model', '#characterModel');
      model.setAttribute('scale', '0.001 0.001 0.001');
      model.setAttribute('shadow', 'cast: true; receive: false');

      // Start with idle animation
      model.setAttribute('animation-mixer', {
        clip: 'idle',
        loop: 'repeat',
        crossFadeDuration: 0.4
      });

      // Appear animation
      model.setAttribute('animation', {
        property: 'scale',
        to: '1 1 1',
        easing: 'easeOutElastic',
        dur: 1000
      });

      document.querySelector('a-scene').appendChild(model);

      // Show controls
      document.getElementById('anim-controls').style.display = 'flex';
      document.getElementById('anim-label').style.display = 'block';
      document.getElementById('anim-label').textContent = '🎬 Idle';
      document.getElementById('instructions').textContent = 'アニメーションを選択';

      setTimeout(() => {
        document.getElementById('instructions').style.opacity = '0';
      }, 3000);
    });

    function playAnim(clip, label) {
      if (!model) return;
      currentAnim = clip;

      model.setAttribute('animation-mixer', {
        clip: clip,
        loop: 'repeat',
        crossFadeDuration: 0.4
      });

      // Update UI
      document.querySelectorAll('#anim-controls button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      document.getElementById('anim-label').textContent = '🎬 ' + label;

      // Flash animation on label
      const labelEl = document.getElementById('anim-label');
      labelEl.style.transform = 'translateX(-50%) scale(1.1)';
      setTimeout(() => {
        labelEl.style.transform = 'translateX(-50%) scale(1)';
      }, 200);
    }
    window.playAnim = playAnim;
  </script>
</body>
</html>
