<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ブリ小僧 SLAM AR</title>

  <!-- 8frame (8th Wall版 A-Frame) -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <!-- XR Extras -->
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Landing Pages -->
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- 8th Wall Engine (ローカルバイナリ — slam チャンク必須) -->
  <script async src="../../lib/xr.js" data-preload-chunks="slam"></script>

  <script>
    // === Global State (全てグローバルスコープ) ===
    var placedModels = [];
    var selectedModel = null;
    var MAX_MODELS = 5;
    var currentModel = 'buri'; // 'buri' or 'kamaboko'
    var initialPinchDist = null;
    var initialScale = 1;
    var wasPinching = false;
    var pinchTimer = null;
    var lastPlaced = null;

    // === A-Frame Component (配置 + ドラッグのみ) ===
    AFRAME.registerComponent('buri-slam', {
      init: function() {
        var self = this;
        var ground = document.getElementById('ground');
        var sceneEl = this.el.sceneEl;

        // Ground tap → place or deselect (skip during pinch)
        ground.addEventListener('click', function(evt) {
          if (wasPinching) return;
          if (!evt.detail || !evt.detail.intersection) return;
          var pt = evt.detail.intersection.point;
          if (selectedModel) {
            deselectModel();
            return;
          }
          if (placedModels.length >= MAX_MODELS) return;
          self.placeModel(pt);
        });

        // One-finger drag for selected model
        sceneEl.addEventListener('onefingermove', function(evt) {
          if (!selectedModel) return;
          var d = evt.detail;
          var pos = selectedModel.getAttribute('position');
          selectedModel.setAttribute('position', {
            x: pos.x + d.positionChange.x * 0.005,
            y: pos.y,
            z: pos.z + d.positionChange.y * 0.005
          });
        });
      },

      placeModel: function(position) {
        var type = currentModel;
        var sceneEl = this.el.sceneEl;

        var el = document.createElement('a-entity');
        el.setAttribute('position', position);
        el.setAttribute('shadow', 'cast: true; receive: false');
        el.classList.add('cantap');
        el.classList.add('buri-model');
        el.dataset.modelType = type;

        var targetScale = 0.5;

        el.addEventListener('model-loaded', function() {
          var obj = el.object3D;
          obj.traverse(function(node) {
            if (node.isMesh) {
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function(mat) {
                mat.transparent = false;
                mat.opacity = 1.0;
                mat.alphaTest = 0;
                mat.depthWrite = true;
                mat.side = THREE.DoubleSide;
                mat.needsUpdate = true;
              });
            }
          });
          el.object3D.scale.set(0.5, 0.5, 0.5);
        });
        el.addEventListener('model-error', function(e) {
          console.error('model load error', e);
        });

        // 選択リング
        var ring = document.createElement('a-torus');
        ring.setAttribute('radius', '0.2');
        ring.setAttribute('radius-tubular', '0.01');
        ring.setAttribute('rotation', '-90 0 0');
        ring.setAttribute('position', '0 0.01 0');
        ring.setAttribute('color', '#FFD700');
        ring.setAttribute('material', 'emissive: #FFD700; emissiveIntensity: 0.5');
        ring.setAttribute('visible', 'false');
        ring.classList.add('select-ring');
        el.appendChild(ring);

        // タップで選択/解除（ピンチ中は無視）
        el.addEventListener('click', function(evt) {
          if (wasPinching) return;
          evt.stopPropagation();
          if (selectedModel === el) {
            deselectModel();
          } else {
            selectModel(el);
          }
        });

        sceneEl.appendChild(el);
        if (type === 'kamaboko') {
          el.setAttribute('gltf-model', 'assets/kamaboko.glb');
        } else {
          el.setAttribute('gltf-model', 'assets/buri-kozou.glb');
        }
        placedModels.push(el);
        lastPlaced = el;
        selectModel(el);
        updateCounter();
        updateGuide();
      }
    });

    // === Global Functions ===
    function selectModel(el) {
      deselectModel();
      selectedModel = el;
      var ring = el.querySelector('.select-ring');
      if (ring) ring.setAttribute('visible', 'true');
      document.getElementById('delete-btn').style.opacity = '1';
      document.getElementById('delete-btn').style.pointerEvents = 'auto';
    }

    function deselectModel() {
      if (selectedModel) {
        var ring = selectedModel.querySelector('.select-ring');
        if (ring) ring.setAttribute('visible', 'false');
      }
      selectedModel = null;
      document.getElementById('delete-btn').style.opacity = '0.4';
      document.getElementById('delete-btn').style.pointerEvents = 'none';
    }

    function deleteSelected() {
      if (!selectedModel) return;
      var idx = placedModels.indexOf(selectedModel);
      if (idx > -1) placedModels.splice(idx, 1);
      selectedModel.setAttribute('animation', {
        property: 'scale',
        to: '0.001 0.001 0.001',
        easing: 'easeInBack',
        dur: 200
      });
      var el = selectedModel;
      setTimeout(function() { el.parentNode.removeChild(el); }, 250);
      selectedModel = null;
      document.getElementById('delete-btn').style.opacity = '0.4';
      document.getElementById('delete-btn').style.pointerEvents = 'none';
      updateCounter();
      updateGuide();
    }

    function resetAll() {
      deselectModel();
      placedModels.forEach(function(m) {
        m.parentNode.removeChild(m);
      });
      placedModels = [];
      updateCounter();
      updateGuide();
    }

    function toggleModel() {
      currentModel = currentModel === 'buri' ? 'kamaboko' : 'buri';
      var btn = document.getElementById('model-toggle');
      if (!btn) return;
      if (currentModel === 'buri') {
        btn.textContent = '\uD83D\uDC1F';
        btn.title = 'ブリ小僧モード';
        btn.style.borderColor = '#00bcd4';
      } else {
        btn.textContent = '\uD83C\uDF65';
        btn.title = 'かまぼこモード';
        btn.style.borderColor = '#ff8a80';
      }
    }

    function updateCounter() {
      var el = document.getElementById('buri-counter');
      if (!el) return;
      var buriCount = 0;
      var kamaCount = 0;
      placedModels.forEach(function(m) {
        if (m.dataset.modelType === 'kamaboko') kamaCount++;
        else buriCount++;
      });
      var parts = [];
      if (buriCount > 0) parts.push('\uD83D\uDC1F ' + buriCount + '\u4F53');
      if (kamaCount > 0) parts.push('\uD83C\uDF65 ' + kamaCount + '\u500B');
      el.textContent = parts.length > 0 ? parts.join(' / ') : '\u30BF\u30C3\u30D7\u3067\u914D\u7F6E';
    }

    function updateGuide() {
      var guide = document.getElementById('guide-msg');
      if (!guide) return;
      if (placedModels.length === 0) {
        guide.style.display = 'block';
      } else {
        guide.style.display = 'none';
      }
    }

    function capturePhoto() {
      var scene = document.querySelector('a-scene');
      var canvas = scene.canvas;
      scene.renderer.render(scene.object3D, scene.camera);
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'buri-ar-' + Date.now() + '.jpg';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.9);
    }
  </script>

  <style>
    body { margin: 0; overflow: hidden; font-family: 'Hiragino Maru Gothic Pro', 'Rounded Mplus 1c', sans-serif; }

    #buri-counter {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 998; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 20px; border-radius: 20px;
      font-size: 15px; font-weight: 600;
      border: 1px solid rgba(0,188,212,0.4);
    }

    #guide-msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 997; background: rgba(0,0,0,0.7); color: #fff;
      padding: 20px 30px; border-radius: 16px;
      font-size: 16px; text-align: center; line-height: 1.8;
      border: 1px solid rgba(0,188,212,0.3);
    }

    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 998;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }

    #action-btns {
      position: fixed; bottom: 30px; right: 16px; z-index: 998;
      display: flex; flex-direction: column; gap: 10px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #action-btns button {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }
    #action-btns button { touch-action: manipulation; }
    #action-btns button:active { transform: scale(0.9); }

    #help-btn {
      position: fixed; top: 20px; right: 20px; z-index: 998;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #help-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9998; background: rgba(0,0,0,0.8);
      align-items: center; justify-content: center;
    }
    #help-overlay.visible { display: flex; }
    #help-content {
      background: #1a1a2e; border: 1px solid rgba(0,188,212,0.3);
      border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
      color: #fff; font-family: 'Hiragino Maru Gothic Pro', sans-serif;
    }
    #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00bcd4; }
    #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
    #help-content .row { font-size: 13px; line-height: 1.8; }
    #help-content .row b { color: #00bcd4; }
    #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
    #help-content .close-help {
      margin-top: 16px; width: 100%; padding: 10px; border: none;
      border-radius: 8px; background: rgba(0,188,212,0.15); color: #00bcd4;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <!-- Back Button -->
  <a id="back-btn" href="../">&#x2190;</a>

  <!-- Counter -->
  <div id="buri-counter">タップで配置</div>

  <!-- Guide Message -->
  <div id="guide-msg">
    地面をスキャンしてください<br>
    タップでブリ小僧を配置できます
  </div>

  <!-- Help Button -->
  <button id="help-btn" onclick="toggleHelp()">?</button>

  <!-- Help Overlay -->
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>&#x1F41F; ブリ小僧 AR</h3>
      <hr class="sep">
      <div class="row"><b>配置:</b> 地面タップで配置（最大5体）</div>
      <div class="row"><b>切替:</b> &#x1F41F;/&#x1F365; ボタンでモデル切替</div>
      <hr class="sep">
      <div class="row"><b>操作:</b></div>
      <ul>
        <li>モデルタップ → 選択</li>
        <li>ピンチ → サイズ変更</li>
        <li>ドラッグ → 移動</li>
        <li>地面タップ → 選択解除</li>
      </ul>
      <hr class="sep">
      <div class="row"><b>ボタン:</b></div>
      <ul>
        <li>&#x1F4F7; 撮影</li>
        <li>&#x1F5D1; 選択中を削除</li>
        <li>&#x21BA; 全リセット</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <!-- Action Buttons -->
  <div id="action-btns">
    <button id="model-toggle" onclick="toggleModel()" title="ブリ小僧モード" style="border-color:#00bcd4;">&#x1F41F;</button>
    <button onclick="capturePhoto()" title="撮影">&#x1F4F7;</button>
    <button id="delete-btn" onclick="deleteSelected()" title="削除" style="opacity:0.4; pointer-events:none;">&#x1F5D1;</button>
    <button onclick="resetAll()" title="全リセット">&#x21BA;</button>
  </div>

  <a-scene
    buri-slam
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; shadowMap: true"
    shadow="type: pcfsoft; autoUpdate: true"
    xrweb="allowedDevices: any">

    <!-- GLBはa-assets経由ではなく直接パスで読み込む（タイムアウト回避） -->

    <a-camera
      id="camera"
      position="0 8 0"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-entity
      light="type: directional; intensity: 0.8; castShadow: true;
             shadowMapHeight: 2048; shadowMapWidth: 2048;
             shadowCameraTop: 20; shadowCameraBottom: -20;
             shadowCameraRight: 20; shadowCameraLeft: -20;
             target: #camera"
      xrextras-attach="target: camera; offset: 8 15 4"
      position="1 4.3 2.5"
      shadow>
    </a-entity>

    <a-light type="ambient" intensity="0.5"></a-light>

    <!-- 透明な地面 — タップでブリ小僧配置 -->
    <a-box
      id="ground"
      class="cantap"
      scale="1000 2 1000"
      position="0 -1 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow>
    </a-box>

  </a-scene>

  <!-- Pinch scale: グローバルスコープでtouch登録（A-Frameコンポーネント外） -->
  <script>
    // capture: true でA-Frameのgesture-detectorより先に受け取る
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length >= 2) {
        // ピンチ開始: フラグを立ててclick誤発火を防ぐ
        wasPinching = true;
        clearTimeout(pinchTimer);
        var target = lastPlaced || selectedModel;
        if (target) {
          var dx = e.touches[0].clientX - e.touches[1].clientX;
          var dy = e.touches[0].clientY - e.touches[1].clientY;
          initialPinchDist = Math.sqrt(dx * dx + dy * dy);
          initialScale = target.object3D.scale.x || 1;
        }
      }
    }, {capture: true, passive: true});

    document.addEventListener('touchmove', function(e) {
      var target = lastPlaced || selectedModel;
      if (e.touches.length >= 2 && target && initialPinchDist) {
        e.preventDefault();
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var ratio = dist / initialPinchDist;
        var newS = Math.min(3.0, Math.max(0.3, initialScale * ratio));
        target.object3D.scale.set(newS, newS, newS);
      }
    }, {capture: true, passive: false});

    document.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) {
        initialPinchDist = null;
        // ピンチ終了後300msはclickを無視（誤タップ防止）
        if (wasPinching) {
          clearTimeout(pinchTimer);
          pinchTimer = setTimeout(function() { wasPinching = false; }, 300);
        }
      }
    }, {capture: true});

    // DRACOLoader設定
    document.querySelector('a-scene').addEventListener('loaded', function() {
      var dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
      var scene = document.querySelector('a-scene');
      var gltfSystem = scene.systems['gltf-model'];
      if (gltfSystem && gltfSystem.gltfLoader) {
        gltfSystem.gltfLoader.setDRACOLoader(dracoLoader);
      }
    });
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '\uD83D\uDCF7', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '\uD83D\uDCCD', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '\uD83C\uDF10', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '\uD83D\uDD12', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
    // Help overlay
    function toggleHelp() {
      document.getElementById('help-overlay').classList.toggle('visible');
    }
    setTimeout(function() {
      document.getElementById('help-overlay').classList.add('visible');
      setTimeout(function() {
        document.getElementById('help-overlay').classList.remove('visible');
      }, 5000);
    }, 3000);
    document.addEventListener('touchstart', function _h() {
      document.getElementById('help-overlay').classList.remove('visible');
      document.removeEventListener('touchstart', _h);
    });
  </script>
</body>
</html>
