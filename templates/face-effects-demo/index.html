<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Face Effects AR Demo</title>

  <!-- 8frame (8th Wall版 A-Frame) -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <!-- XR Extras -->
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Landing Pages -->
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- 8th Wall Engine (ローカルバイナリ — Face チャンクをプリロード) -->
  <script async src="../../lib/xr.js" data-preload-chunks="face"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #effect-switcher {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #effect-switcher button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.6);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #effect-switcher button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #effect-switcher button:active { transform: scale(0.95); }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>

<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Face Effects</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> カメラを顔に向ける</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>顔にグラス・クラウンのエフェクト</li>
        <li>ボタンで切り替え</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="effect-switcher">
    <button class="active" onclick="switchEffect('glasses')">Glasses</button>
    <button onclick="switchEffect('crown')">Crown</button>
    <button onclick="switchEffect('')">Off</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrface="allowedDevices: any; cameraDirection: front; mirroredDisplay: true">

    <a-camera id="camera" position="0 4 4"></a-camera>

    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" intensity="0.8" position="0 1 1"></a-light>

    <!-- 3Dエフェクト -->
    <a-entity xrextras-faceanchor>

      <!-- メガネ（noseBridge） -->
      <a-entity xrextras-face-attachment="point: noseBridge">
        <a-entity id="glasses-effect" visible="true" scale="8 8 8" rotation="0 180 0">
          <!-- ブリッジ（短縮: 0.08 → 0.05） -->
          <a-box position="0 0 0.01" width="0.03" height="0.008" depth="0.006"
                 color="#222" material="shader: flat"></a-box>
          <!-- 左レンズ枠 -->
          <a-torus position="-0.04 0 0.01" radius="0.028" radius-tubular="0.004"
                   color="#222" segments-tubular="24" segments-radial="12"
                   material="shader: flat"></a-torus>
          <!-- 左レンズ -->
          <a-circle position="-0.04 0 0.012" radius="0.026"
                    material="shader: flat; color: #88BBFF; opacity: 0.25; transparent: true; side: double"></a-circle>
          <!-- 右レンズ枠 -->
          <a-torus position="0.04 0 0.01" radius="0.028" radius-tubular="0.004"
                   color="#222" segments-tubular="24" segments-radial="12"
                   material="shader: flat"></a-torus>
          <!-- 右レンズ -->
          <a-circle position="0.04 0 0.012" radius="0.026"
                    material="shader: flat; color: #88BBFF; opacity: 0.25; transparent: true; side: double"></a-circle>
          <!-- つる -->
          <a-box position="-0.072 0 -0.03" width="0.006" height="0.006" depth="0.07"
                 color="#222" material="shader: flat"></a-box>
          <a-box position="0.072 0 -0.03" width="0.006" height="0.006" depth="0.07"
                 color="#222" material="shader: flat"></a-box>
        </a-entity>
      </a-entity>

      <!-- 王冠（forehead） -->
      <a-entity xrextras-face-attachment="point: forehead">
        <a-entity id="crown-effect" visible="false" scale="7 7 7" position="0 0.07 0" rotation="0 180 0">
          <!-- ベースバンド -->
          <a-box position="0 0 0" width="0.14" height="0.025" depth="0.005"
                 color="#FFD700" material="shader: flat"></a-box>
          <!-- 尖り -->
          <a-cone position="0 0.035 0" radius-bottom="0.012" radius-top="0"
                  height="0.04" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="-0.03 0.028 0" radius-bottom="0.01" radius-top="0"
                  height="0.035" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="0.03 0.028 0" radius-bottom="0.01" radius-top="0"
                  height="0.035" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="-0.055 0.022 0" radius-bottom="0.008" radius-top="0"
                  height="0.025" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="0.055 0.022 0" radius-bottom="0.008" radius-top="0"
                  height="0.025" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <!-- 宝石 -->
          <a-sphere position="0 0.03 0.006" radius="0.008"
                    color="#E74C3C" material="shader: flat"></a-sphere>
          <a-sphere position="-0.03 0.022 0.006" radius="0.006"
                    color="#3498DB" material="shader: flat"></a-sphere>
          <a-sphere position="0.03 0.022 0.006" radius="0.006"
                    color="#2ECC71" material="shader: flat"></a-sphere>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    // === エフェクト切り替え ===
    let currentEffect = 'glasses'

    function switchEffect(name) {
      currentEffect = name

      // 3Dアタッチメント
      const el3d = {glasses: 'glasses-effect', crown: 'crown-effect'}
      Object.entries(el3d).forEach(([key, id]) => {
        const el = document.getElementById(id)
        if (el) el.setAttribute('visible', key === name)
      })

      // ボタンUI
      document.querySelectorAll('#effect-switcher button').forEach(btn => {
        const t = btn.textContent.toLowerCase()
        btn.classList.toggle('active', t === name || (name === '' && t === 'off'))
      })
    }
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
