<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Face Effects AR Demo [DEBUG]</title>

  <!-- 8frame (8th Wall版 A-Frame) -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <!-- XR Extras -->
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Landing Pages -->
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- 8th Wall Engine (ローカルバイナリ — Face チャンクをプリロード) -->
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="face"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #effect-switcher {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    #effect-switcher button {
      padding: 10px 16px; border: 2px solid rgba(255,255,255,0.6);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #effect-switcher button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #effect-switcher button:active { transform: scale(0.95); }

    /* === DEBUG OVERLAY === */
    #debug-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      max-height: 40vh;
      overflow-y: auto;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.85);
      color: #00ff66;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      line-height: 1.4;
      padding: 8px 10px;
      pointer-events: auto;
      border-bottom: 2px solid #00ff66;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug-overlay .debug-title {
      color: #ffcc00;
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 4px;
    }
    #debug-overlay .debug-line {
      margin: 1px 0;
    }
    #debug-overlay .debug-line .ts {
      color: #888;
    }
    #debug-overlay .debug-line .msg {
      color: #00ff66;
    }
    #debug-overlay .debug-line.warn .msg {
      color: #ffcc00;
    }
    #debug-overlay .debug-line.error .msg {
      color: #ff4444;
    }
  </style>
</head>

<body>

  <!-- DEBUG OVERLAY -->
  <div id="debug-overlay">
    <div class="debug-title">[DEBUG] Face Effects AR Demo</div>
  </div>

  <div id="effect-switcher">
    <button class="active" onclick="switchEffect('mesh')">Mesh</button>
    <button onclick="switchEffect('paint')">Paint</button>
    <button onclick="switchEffect('glasses')">Glasses</button>
    <button onclick="switchEffect('crown')">Crown</button>
    <button onclick="switchEffect('')">Off</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrface="allowedDevices: any; cameraDirection: front; mirroredDisplay: true">

    <a-camera id="camera" position="0 4 4"></a-camera>

    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" intensity="0.8" position="0 1 1"></a-light>

    <!-- 顔メッシュ（JSから直接マテリアル制御） -->
    <xrextras-face-mesh id="face-mesh"></xrextras-face-mesh>

    <!-- 3Dエフェクト -->
    <a-entity xrextras-faceanchor>

      <!-- メガネ（noseBridge） -->
      <a-entity xrextras-face-attachment="point: noseBridge">
        <a-entity id="glasses-effect" visible="false" scale="3.5 3.5 3.5">
          <!-- ブリッジ -->
          <a-box position="0 0 0.01" width="0.08" height="0.008" depth="0.006"
                 color="#222" material="shader: flat"></a-box>
          <!-- 左レンズ枠 -->
          <a-torus position="-0.04 0 0.01" radius="0.028" radius-tubular="0.004"
                   color="#222" segments-tubular="24" segments-radial="12"
                   material="shader: flat"></a-torus>
          <!-- 左レンズ -->
          <a-circle position="-0.04 0 0.012" radius="0.026"
                    material="shader: flat; color: #88BBFF; opacity: 0.25; transparent: true; side: double"></a-circle>
          <!-- 右レンズ枠 -->
          <a-torus position="0.04 0 0.01" radius="0.028" radius-tubular="0.004"
                   color="#222" segments-tubular="24" segments-radial="12"
                   material="shader: flat"></a-torus>
          <!-- 右レンズ -->
          <a-circle position="0.04 0 0.012" radius="0.026"
                    material="shader: flat; color: #88BBFF; opacity: 0.25; transparent: true; side: double"></a-circle>
          <!-- つる -->
          <a-box position="-0.072 0 -0.03" width="0.006" height="0.006" depth="0.07"
                 color="#222" material="shader: flat"></a-box>
          <a-box position="0.072 0 -0.03" width="0.006" height="0.006" depth="0.07"
                 color="#222" material="shader: flat"></a-box>
        </a-entity>
      </a-entity>

      <!-- 王冠（forehead） -->
      <a-entity xrextras-face-attachment="point: forehead">
        <a-entity id="crown-effect" visible="false" scale="3 3 3" position="0 0.06 0">
          <!-- ベースバンド -->
          <a-box position="0 0 0" width="0.14" height="0.025" depth="0.005"
                 color="#FFD700" material="shader: flat"></a-box>
          <!-- 尖り -->
          <a-cone position="0 0.035 0" radius-bottom="0.012" radius-top="0"
                  height="0.04" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="-0.03 0.028 0" radius-bottom="0.01" radius-top="0"
                  height="0.035" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="0.03 0.028 0" radius-bottom="0.01" radius-top="0"
                  height="0.035" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="-0.055 0.022 0" radius-bottom="0.008" radius-top="0"
                  height="0.025" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <a-cone position="0.055 0.022 0" radius-bottom="0.008" radius-top="0"
                  height="0.025" color="#FFD700" material="shader: flat"
                  segments-radial="4"></a-cone>
          <!-- 宝石 -->
          <a-sphere position="0 0.03 0.006" radius="0.008"
                    color="#E74C3C" material="shader: flat"></a-sphere>
          <a-sphere position="-0.03 0.022 0.006" radius="0.006"
                    color="#3498DB" material="shader: flat"></a-sphere>
          <a-sphere position="0.03 0.022 0.006" radius="0.006"
                    color="#2ECC71" material="shader: flat"></a-sphere>
        </a-entity>
      </a-entity>

    </a-entity>

  </a-scene>

  <script>
    // === DEBUG LOGGING ===
    const _debugStart = performance.now()
    const _debugOverlay = document.getElementById('debug-overlay')
    let _debugLineCount = 0

    function debugLog(msg, level) {
      level = level || 'info'
      const elapsed = ((performance.now() - _debugStart) / 1000).toFixed(3)
      const ts = '[' + elapsed + 's]'
      const fullMsg = ts + ' ' + msg

      // Console output
      if (level === 'error') {
        console.error('[DEBUG]', fullMsg)
      } else if (level === 'warn') {
        console.warn('[DEBUG]', fullMsg)
      } else {
        console.log('[DEBUG]', fullMsg)
      }

      // Overlay output
      _debugLineCount++
      const line = document.createElement('div')
      line.className = 'debug-line' + (level !== 'info' ? ' ' + level : '')
      line.innerHTML = '<span class="ts">' + ts + '</span> <span class="msg">' + msg + '</span>'
      _debugOverlay.appendChild(line)

      // Auto-scroll to bottom
      _debugOverlay.scrollTop = _debugOverlay.scrollHeight

      // Limit to last 200 lines to prevent memory issues
      if (_debugLineCount > 200) {
        const lines = _debugOverlay.querySelectorAll('.debug-line')
        if (lines.length > 200) {
          lines[0].remove()
        }
      }
    }

    // === Face Mesh マテリアル管理 ===
    // xrextras-face-mesh はカスタム要素なので A-Frame コンポーネントが動かない。
    // MutationObserver + ポーリングで headMesh の生成を検出し、
    // Three.js マテリアルを直接差し替える。

    const materials = {}
    let paintTexture = null
    let currentEffect = 'mesh'
    let headMeshNode = null

    // テクスチャを事前ロード
    function loadPaintTexture() {
      debugLog('loadPaintTexture() called, creating THREE.TextureLoader')
      const loader = new THREE.TextureLoader()
      loader.load('./assets/face-alpha.png', (tex) => {
        tex.flipY = false
        paintTexture = tex
        debugLog('Texture loaded: face-alpha.png (size=' + tex.image.width + 'x' + tex.image.height + ')')
        // paint モードが選択済みなら適用
        if (currentEffect === 'paint' && headMeshNode) {
          debugLog('Paint mode was pending, applying now')
          applyMaterial('paint')
        }
      }, undefined, (err) => {
        debugLog('Texture load FAILED: ' + (err && err.message ? err.message : String(err)), 'error')
      })
    }

    // マテリアル生成（遅延初期化）
    function getMaterial(name) {
      if (materials[name]) return materials[name]

      debugLog('Creating new material: "' + name + '"')

      if (name === 'mesh') {
        materials[name] = new THREE.MeshBasicMaterial({
          color: 0x00FFFF,
          wireframe: true,
          opacity: 0.6,
          transparent: true,
        })
      } else if (name === 'paint' && paintTexture) {
        materials[name] = new THREE.MeshBasicMaterial({
          map: paintTexture,
          alphaMap: paintTexture,
          transparent: true,
          opacity: 0.75,
          color: 0xFFFFFF,
          side: THREE.DoubleSide,
        })
      } else if (name === 'off') {
        materials[name] = new THREE.MeshBasicMaterial({
          transparent: true,
          opacity: 0,
        })
      }

      if (materials[name]) {
        debugLog('Material created: "' + name + '" (type=' + materials[name].type + ')')
      } else {
        debugLog('Material NOT created for "' + name + '" (missing texture?)', 'warn')
      }

      return materials[name]
    }

    // headMesh にマテリアルを適用
    function applyMaterial(name) {
      if (!headMeshNode) {
        debugLog('applyMaterial("' + name + '") skipped: headMeshNode is null', 'warn')
        return
      }
      const mat = getMaterial(name)
      if (!mat) {
        debugLog('applyMaterial("' + name + '") skipped: material is null', 'warn')
        return
      }
      let meshCount = 0
      headMeshNode.traverse((node) => {
        if (node.isMesh) {
          node.material = mat
          node.material.needsUpdate = true
          meshCount++
        }
      })
      debugLog('Material "' + name + '" applied to ' + meshCount + ' mesh node(s)')
    }

    // xrextras-face-mesh の内部 headMesh を探す（ポーリング）
    function findHeadMesh() {
      const meshEl = document.getElementById('face-mesh')
      if (!meshEl) {
        debugLog('face-mesh element NOT found in DOM', 'warn')
        return false
      }

      // xrextras-face-mesh コンポーネントの内部構造を探索
      // 方法1: コンポーネント経由
      if (meshEl.components && meshEl.components['xrextras-face-mesh']) {
        const comp = meshEl.components['xrextras-face-mesh']
        if (comp.headMesh && comp.headMesh.mesh) {
          headMeshNode = comp.headMesh.mesh
          debugLog('headMesh found via component.headMesh.mesh')
          return true
        }
      }

      // 方法2: object3D を直接探索
      if (meshEl.object3D) {
        let found = false
        let nodeCount = 0
        meshEl.object3D.traverse((node) => {
          nodeCount++
          if (node.isMesh && !found) {
            headMeshNode = meshEl.object3D
            found = true
          }
        })
        if (found) {
          debugLog('headMesh found via object3D traversal (total nodes: ' + nodeCount + ')')
          return true
        }
      }

      // 方法3: 子要素の Three.js オブジェクトを探索
      const children = meshEl.children
      for (let i = 0; i < children.length; i++) {
        if (children[i].object3D) {
          let found = false
          children[i].object3D.traverse((node) => {
            if (node.isMesh && !found) {
              headMeshNode = children[i].object3D
              found = true
            }
          })
          if (found) {
            debugLog('headMesh found via child[' + i + '].object3D traversal')
            return true
          }
        }
      }

      return false
    }

    // ポーリングで headMesh を探し、見つかったらマテリアル適用
    let pollCount = 0
    function pollForHeadMesh() {
      debugLog('pollForHeadMesh() attempt #' + (pollCount + 1) + '/100')

      // Check face-mesh element status
      const meshEl = document.getElementById('face-mesh')
      if (meshEl) {
        const compKeys = meshEl.components ? Object.keys(meshEl.components) : []
        debugLog('  face-mesh element found, components: [' + compKeys.join(', ') + ']')

        if (meshEl.object3D) {
          let meshNodeCount = 0
          meshEl.object3D.traverse((node) => {
            if (node.isMesh) meshNodeCount++
          })
          debugLog('  face-mesh object3D mesh nodes: ' + meshNodeCount)
        } else {
          debugLog('  face-mesh object3D: null')
        }
      }

      if (findHeadMesh()) {
        debugLog('headMesh FOUND, applying material: "' + currentEffect + '"')
        applyMaterial(currentEffect)
        // face-mesh は毎フレーム visible=true を強制するが、
        // マテリアルは書き換えないので一度設定すればOK。
        // ただし xrextras が独自マテリアルを再適用する場合に備えて定期的にチェック
        setInterval(() => {
          applyMaterial(currentEffect)
        }, 500)
        return
      }
      pollCount++
      if (pollCount < 100) {  // 最大10秒
        setTimeout(pollForHeadMesh, 100)
      } else {
        debugLog('headMesh NOT found after 100 attempts (10s timeout)', 'error')
      }
    }

    // === エフェクト切り替え ===
    function switchEffect(name) {
      debugLog('switchEffect("' + name + '") called (previous: "' + currentEffect + '")')
      currentEffect = name

      // 顔メッシュ: mesh or paint or off
      if (name === 'mesh' || name === 'paint') {
        debugLog('  Applying face mesh material: "' + name + '"')
        applyMaterial(name)
      } else {
        debugLog('  Applying face mesh material: "off" (effect="' + name + '")')
        applyMaterial('off')
      }

      // 3Dアタッチメント
      const el3d = {glasses: 'glasses-effect', crown: 'crown-effect'}
      Object.entries(el3d).forEach(([key, id]) => {
        const el = document.getElementById(id)
        if (el) {
          const vis = key === name
          el.setAttribute('visible', vis)
          debugLog('  3D attachment "' + id + '" visible=' + vis)
        }
      })

      // ボタンUI
      document.querySelectorAll('#effect-switcher button').forEach(btn => {
        const t = btn.textContent.toLowerCase()
        btn.classList.toggle('active', t === name || (name === '' && t === 'off'))
      })
    }

    // === 初期化 ===
    window.addEventListener('DOMContentLoaded', () => {
      debugLog('DOMContentLoaded fired')

      // THREE.js version
      if (typeof THREE !== 'undefined') {
        debugLog('THREE.js version: ' + THREE.REVISION)
      } else {
        debugLog('THREE.js NOT available at DOMContentLoaded', 'warn')
      }

      // XR8 loaded check
      if (typeof XR8 !== 'undefined') {
        debugLog('XR8 is available at DOMContentLoaded')
      } else {
        debugLog('XR8 not yet loaded (expected, it is async)', 'warn')
      }

      // Check face-mesh element
      const meshEl = document.getElementById('face-mesh')
      if (meshEl) {
        debugLog('face-mesh element found in DOM')
        const compKeys = meshEl.components ? Object.keys(meshEl.components) : []
        debugLog('face-mesh components: [' + compKeys.join(', ') + ']')
      } else {
        debugLog('face-mesh element NOT found in DOM', 'error')
      }

      // Check XRExtras
      if (typeof XRExtras !== 'undefined') {
        debugLog('XRExtras is available')
      } else {
        debugLog('XRExtras not yet loaded', 'warn')
      }

      debugLog('Calling loadPaintTexture()')
      loadPaintTexture()

      // XR8 ロード後にポーリング開始
      debugLog('Scheduling pollForHeadMesh() in 1000ms')
      setTimeout(pollForHeadMesh, 1000)

      // Periodic environment check
      setTimeout(() => {
        debugLog('--- Delayed environment check (2s) ---')
        if (typeof XR8 !== 'undefined') {
          debugLog('XR8 is now available')
        } else {
          debugLog('XR8 still not available after 2s', 'warn')
        }
        if (typeof THREE !== 'undefined') {
          debugLog('THREE.js version (recheck): ' + THREE.REVISION)
        }
      }, 2000)
    })
  </script>
</body>
</html>
