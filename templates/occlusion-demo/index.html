<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Occlusion AR Demo</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none; text-align: center;
    }
    #controls {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; gap: 8px; align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #controls button {
      padding: 12px 20px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 25px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 14px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    #controls button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #occlusion-label {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 8px 16px; border-radius: 12px;
      font-size: 13px; font-family: sans-serif; font-weight: 600;
      transition: all 0.3s;
    }
    #occlusion-label.on {
      background: rgba(74,222,128,0.15); color: #4ade80;
      border: 1px solid #4ade80;
    }
    #occlusion-label.off {
      background: rgba(239,68,68,0.15); color: #ef4444;
      border: 1px solid #ef4444;
    }
    #step-overlay {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 998; background: rgba(0,0,0,0.85); color: #fff;
      padding: 24px 28px; border-radius: 16px; font-size: 14px;
      font-family: sans-serif; text-align: left; line-height: 2;
      max-width: 300px; display: none;
      border: 1px solid rgba(0,240,255,0.3);
    }
    #step-overlay .step { display: flex; gap: 10px; align-items: center; }
    #step-overlay .step-num {
      background: #00f0ff; color: #000; width: 24px; height: 24px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; flex-shrink: 0;
    }
    #step-overlay .close-btn {
      margin-top: 16px; padding: 10px 20px; border: none;
      border-radius: 8px; background: #00f0ff; color: #000;
      font-size: 14px; font-weight: 700; cursor: pointer;
      width: 100%;
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>Occlusion</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> 地面を検出してカメラを低くする</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>ARオブジェクトが壁の後ろに隠れるリアル遮蔽体験</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="info">地面をタップしてオクルージョンデモを配置</div>
  <div id="occlusion-label" class="on">Occlusion: ON</div>
  <div id="controls">
    <button class="active" onclick="toggleOcclusion()">Occlusion ON/OFF</button>
    <button onclick="resetScene()">Reset</button>
  </div>

  <!-- Step overlay -->
  <div id="step-overlay">
    <div style="font-weight:700; font-size:16px; margin-bottom:12px; color:#00f0ff;">Occlusion デモの使い方</div>
    <div class="step"><span class="step-num">1</span> 地面をタップして配置</div>
    <div class="step"><span class="step-num">2</span> 壁の後ろにオブジェクトが隠れます</div>
    <div class="step"><span class="step-num">3</span> カメラを動かして確認</div>
    <div class="step"><span class="step-num">4</span> ON/OFFで遮蔽効果を比較</div>
    <button class="close-btn" onclick="this.parentElement.style.display='none'">閉じる</button>
  </div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera id="camera" position="0 4 4"
      raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" intensity="0.8" position="2 4 1" castShadow="true"
      shadow="mapSize: 2048 2048; camera-near: 0.1; camera-far: 50"></a-light>

    <a-entity id="ground" class="cantap"
      geometry="primitive: plane; width: 100; height: 100"
      rotation="-90 0 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow="receive: true"></a-entity>

    <!-- Container for the occlusion setup (placed on tap) -->
    <a-entity id="demo-group" visible="false">

      <!-- Occluder wall (hider material — invisible but blocks rendering) -->
      <a-box id="occluder-wall" position="0 0.4 0"
        width="0.8" height="0.8" depth="0.15"
        xrextras-hider-material
        visible="true">
      </a-box>

      <!-- Visual wireframe indicator of wall position -->
      <a-box id="wall-wireframe" position="0 0.4 0"
        width="0.82" height="0.82" depth="0.17"
        material="wireframe: true; color: #00f0ff; opacity: 0.5; transparent: true">
      </a-box>

      <!-- Label for wall -->
      <a-text value="Occluder Wall" position="0 0.95 0" align="center"
        color="#00f0ff" scale="0.5 0.5 0.5" side="double"></a-text>

      <!-- Bright colored objects behind the wall (will be hidden by occlusion) -->
      <a-sphere position="0 0.3 -0.5" radius="0.15" color="#FFD700"
        material="shader: flat"
        animation="property: position; to: 0 0.5 -0.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-sphere>

      <a-box position="-0.3 0.25 -0.4" width="0.2" height="0.2" depth="0.2" color="#00FFFF"
        material="shader: flat"
        animation="property: rotation; to: 360 360 0; dur: 5000; loop: true; easing: linear"></a-box>

      <a-cone position="0.3 0.3 -0.6" radius-bottom="0.12" height="0.3" color="#FF6B9D"
        material="shader: flat"
        animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear"></a-cone>

      <!-- Objects in front of the wall (always visible) -->
      <a-sphere position="-0.4 0.2 0.4" radius="0.12" color="#FF4444"
        material="shader: flat"
        animation="property: position; to: -0.4 0.35 0.4; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"></a-sphere>

      <a-dodecahedron position="0.4 0.2 0.4" radius="0.1" color="#44FF44"
        material="shader: flat"
        animation="property: rotation; to: 360 0 360; dur: 6000; loop: true; easing: linear"></a-dodecahedron>

    </a-entity>
  </a-scene>

  <script>
    let occlusionOn = true;
    let placed = false;

    // Show step overlay after 2 seconds
    setTimeout(() => {
      document.getElementById('step-overlay').style.display = 'block';
    }, 2000);

    document.getElementById('ground').addEventListener('click', (event) => {
      if (placed) return;
      placed = true;

      const point = event.detail.intersection.point;
      const group = document.getElementById('demo-group');
      group.setAttribute('position', `${point.x} ${point.y} ${point.z}`);
      group.setAttribute('visible', 'true');

      // Pop-in animation
      group.setAttribute('scale', '0.01 0.01 0.01');
      group.setAttribute('animation', {
        property: 'scale',
        to: '1 1 1',
        dur: 800,
        easing: 'easeOutElastic'
      });

      document.getElementById('info').textContent = 'カメラを動かして壁の裏を確認 / ON/OFFで比較';
      document.getElementById('step-overlay').style.display = 'none';
      setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 4000);
    });

    function toggleOcclusion() {
      occlusionOn = !occlusionOn;
      const wall = document.getElementById('occluder-wall');
      const wireframe = document.getElementById('wall-wireframe');
      const label = document.getElementById('occlusion-label');
      const btn = document.querySelector('#controls button');

      wall.setAttribute('visible', occlusionOn);
      wireframe.setAttribute('material', `wireframe: true; color: ${occlusionOn ? '#00f0ff' : '#666'}; opacity: ${occlusionOn ? 0.5 : 0.15}; transparent: true`);

      label.textContent = `Occlusion: ${occlusionOn ? 'ON' : 'OFF'}`;
      label.className = occlusionOn ? 'on' : 'off';
      btn.classList.toggle('active', occlusionOn);
    }
    window.toggleOcclusion = toggleOcclusion;

    function resetScene() {
      const group = document.getElementById('demo-group');
      group.setAttribute('visible', 'false');
      placed = false;
      document.getElementById('info').textContent = '地面をタップしてオクルージョンデモを配置';
      document.getElementById('info').style.opacity = '1';
    }
    window.resetScene = resetScene;
  </script>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
