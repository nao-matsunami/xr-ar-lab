<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Curved Target AR Demo</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(0,0,0,0.6); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: sans-serif; pointer-events: none; text-align: center;
      max-width: 90%; line-height: 1.5;
    }
    #tracking-status {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 8px 16px; border-radius: 12px;
      font-size: 13px; font-family: sans-serif; font-weight: 600;
      background: rgba(0,0,0,0.5); color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    #tracking-status.found {
      color: #4ade80; border-color: #4ade80;
      background: rgba(74,222,128,0.15);
    }
  </style>
</head>
<body>
  <div id="info">缶やボトルのラベルにカメラをかざしてください<br><small>Curved Surface Tracking Demo</small></div>
  <div id="tracking-status">Searching...</div>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any; disableWorldTracking: true">

    <a-camera id="camera" position="0 4 4"></a-camera>
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" intensity="0.5" position="0 2 1"></a-light>

    <!-- Curved surface target -->
    <xrextras-named-image-target name="curved-surface">
      <!-- Cylinder overlay to simulate curved surface wrapping -->
      <a-cylinder position="0 0 0" radius="0.04" height="0.12" open-ended="true"
        material="color: #00f0ff; opacity: 0.3; transparent: true; side: double; shader: flat"
        rotation="0 0 0"
        animation="property: material.opacity; from: 0; to: 0.3; dur: 500">
      </a-cylinder>

      <!-- Info panel floating above -->
      <a-entity position="0 0.12 0.05">
        <a-plane width="0.15" height="0.06" color="#000"
          material="opacity: 0.8; transparent: true; shader: flat">
        </a-plane>
        <a-text value="Curved Surface\nTracking" position="0 0 0.001" align="center"
          color="#00f0ff" scale="0.08 0.08 0.08" side="double"></a-text>
      </a-entity>

      <!-- Decorative ring -->
      <a-torus position="0 0 0" radius="0.05" radius-tubular="0.002"
        color="#00f0ff" material="shader: flat"
        rotation="90 0 0"
        animation__rotate="property: rotation; to: 90 360 0; loop: true; dur: 3000; easing: linear">
      </a-torus>

      <!-- Scanning lines effect -->
      <a-plane position="0 0 0.041" width="0.08" height="0.002" color="#00f0ff"
        material="shader: flat; opacity: 0.8; transparent: true"
        animation="property: position; from: 0 -0.06 0.041; to: 0 0.06 0.041; dur: 1500; loop: true; easing: linear">
      </a-plane>
    </xrextras-named-image-target>

  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const status = document.getElementById('tracking-status');

    scene.addEventListener('xrimagefound', (e) => {
      if (e.detail.name === 'curved-surface') {
        status.textContent = 'Curved Surface Detected';
        status.classList.add('found');
      }
    });
    scene.addEventListener('xrimagelost', (e) => {
      if (e.detail.name === 'curved-surface') {
        status.textContent = 'Searching...';
        status.classList.remove('found');
      }
    });
  </script>
</body>
</html>
