<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Minimal Test</title>

    <!-- 8frame (8th Wall版 A-Frame) -->
    <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

    <!-- XR Extras -->
    <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- Landing Pages -->
    <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

    <!-- 8th Wall Engine (ローカルバイナリ — 旧 apps.8thwall.com/xrweb?appKey=XXXXX を置き換え) -->
    <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>
  </head>

  <body>
    <a-scene
      landing-page
      xrextras-loading
      xrextras-runtime-error
      renderer="colorManagement: true"
      xrweb="allowedDevices: any">

      <a-camera
        id="camera"
        position="0 8 0"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>

      <a-entity
        light="type: directional; intensity: 0.8; castShadow: true;
               shadowMapHeight: 2048; shadowMapWidth: 2048;
               shadowCameraTop: 20; shadowCameraBottom: -20;
               shadowCameraRight: 20; shadowCameraLeft: -20;
               target: #camera"
        xrextras-attach="target: camera; offset: 8 15 4"
        position="1 4.3 2.5"
        shadow>
      </a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>

      <a-box position="0 0.5 -3" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" shadow></a-plane>

    </a-scene>
  </body>
</html>
