<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>World SLAM AR Demo</title>

  <!-- 8frame (8th Wall版 A-Frame) -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <!-- XR Extras -->
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Landing Pages -->
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>

  <!-- 8th Wall Engine (ローカルバイナリ — SLAM チャンクをプリロード) -->
  <script async src="../../vendor/engine/xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <script>
    // --- 現在の配置モード ---
    let currentShape = 'box'
    let placedObjects = []

    // --- タップで配置するコンポーネント ---
    AFRAME.registerComponent('tap-place-multi', {
      init() {
        const ground = document.getElementById('ground')
        ground.addEventListener('click', (event) => {
          const touchPoint = event.detail.intersection.point
          const el = document.createElement('a-entity')
          const yRot = Math.random() * 360

          el.setAttribute('position', touchPoint)
          el.setAttribute('rotation', '0 ' + yRot + ' 0')
          el.setAttribute('visible', false)
          el.setAttribute('scale', '0.0001 0.0001 0.0001')
          el.setAttribute('shadow', {receive: false})
          el.classList.add('placed-object')
          el.classList.add('cantap')

          // 選択中の形状に応じてオブジェクトを作成
          const shape = currentShape
          const colors = ['#4CC3D9', '#E74C3C', '#2ECC71', '#F39C12', '#9B59B6', '#1ABC9C']
          const color = colors[Math.floor(Math.random() * colors.length)]

          let child
          switch (shape) {
            case 'sphere':
              child = document.createElement('a-sphere')
              child.setAttribute('radius', '0.3')
              child.setAttribute('color', color)
              child.setAttribute('position', '0 0.3 0')
              break
            case 'cylinder':
              child = document.createElement('a-cylinder')
              child.setAttribute('radius', '0.2')
              child.setAttribute('height', '0.8')
              child.setAttribute('color', color)
              child.setAttribute('position', '0 0.4 0')
              break
            case 'cone':
              child = document.createElement('a-cone')
              child.setAttribute('radius-bottom', '0.3')
              child.setAttribute('radius-top', '0')
              child.setAttribute('height', '0.8')
              child.setAttribute('color', color)
              child.setAttribute('position', '0 0.4 0')
              break
            default: // box
              child = document.createElement('a-box')
              child.setAttribute('width', '0.5')
              child.setAttribute('height', '0.5')
              child.setAttribute('depth', '0.5')
              child.setAttribute('color', color)
              child.setAttribute('position', '0 0.25 0')
              break
          }

          child.setAttribute('shadow', '')
          el.appendChild(child)
          this.el.sceneEl.appendChild(el)
          placedObjects.push(el)

          // ポップインアニメーション
          el.setAttribute('visible', true)
          el.setAttribute('animation', {
            property: 'scale',
            to: '1 1 1',
            easing: 'easeOutElastic',
            dur: 800,
          })

          updateCounter()
        })
      },
    })

    function selectShape(shape) {
      currentShape = shape
      document.querySelectorAll('#shape-picker button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.shape === shape)
      })
    }

    function undoLast() {
      if (placedObjects.length === 0) return
      const last = placedObjects.pop()
      last.setAttribute('animation', {
        property: 'scale',
        to: '0.0001 0.0001 0.0001',
        easing: 'easeInBack',
        dur: 300,
      })
      setTimeout(() => last.remove(), 350)
      updateCounter()
    }

    function clearAll() {
      placedObjects.forEach(obj => obj.remove())
      placedObjects = []
      updateCounter()
    }

    function updateCounter() {
      const el = document.getElementById('object-count')
      if (el) el.textContent = placedObjects.length
    }
  </script>

  <style>
    body { margin: 0; overflow: hidden; }

    #ui-overlay {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 999; padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 8px; align-items: center;
    }

    #shape-picker {
      display: flex; gap: 6px;
    }
    #shape-picker button {
      width: 54px; height: 54px; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 12px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      transition: all 0.2s;
    }
    #shape-picker button .icon { font-size: 20px; }
    #shape-picker button.active {
      border-color: #00f0ff; color: #00f0ff;
      background: rgba(0,240,255,0.15);
    }
    #shape-picker button:active { transform: scale(0.9); }

    #actions {
      display: flex; gap: 8px; align-items: center;
    }
    #actions button {
      padding: 10px 18px; border: 2px solid rgba(255,255,255,0.4);
      border-radius: 20px; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 13px; font-weight: 600;
      min-height: 44px;
      cursor: pointer; transition: all 0.2s;
    }
    #actions button:active { transform: scale(0.95); }
    #actions .counter {
      color: rgba(255,255,255,0.7); font-size: 12px;
      font-family: monospace;
    }
  </style>
<style>
  #help-btn {
    position: fixed; top: 20px; right: 20px; z-index: 998;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #help-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9998; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
  }
  #help-overlay.visible { display: flex; }
  #help-content {
    background: #1a1a2e; border: 1px solid rgba(0,240,255,0.3);
    border-radius: 16px; padding: 24px; max-width: 300px; width: 90%;
    color: #fff; font-family: sans-serif;
  }
  #help-content h3 { margin: 0 0 12px; font-size: 18px; color: #00f0ff; }
  #help-content .sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 10px 0; }
  #help-content .row { font-size: 13px; line-height: 1.8; }
  #help-content .row b { color: #00f0ff; }
  #help-content ul { margin: 4px 0 0 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: #ccc; }
  #help-content .close-help {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    border-radius: 8px; background: rgba(0,240,255,0.15); color: #00f0ff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>

<body>

  <!-- Unified Error Overlay -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px; box-sizing:border-box;">
    <div style="font-size:48px; margin-bottom:16px;" id="error-icon"></div>
    <div style="font-size:20px; font-weight:bold; margin-bottom:12px;" id="error-title">Error</div>
    <div style="font-size:14px; line-height:1.6; max-width:300px; white-space:pre-line;" id="error-message"></div>
    <button onclick="location.reload()" style="margin-top:24px; padding:12px 24px; background:#fff; color:#000; border:none; border-radius:8px; font-size:16px; cursor:pointer;">再試行</button>
    <a href="/templates/" style="margin-top:12px; color:#aaa; font-size:14px; text-decoration:none;">デモ一覧に戻る</a>
  </div>

  <button id="help-btn" onclick="toggleHelp()">?</button>
  <div id="help-overlay" onclick="toggleHelp()">
    <div id="help-content" onclick="event.stopPropagation()">
      <h3>World SLAM</h3>
      <hr class="sep">
      <div class="row"><b>使い方:</b> カメラで床・地面をスキャン</div>
      <hr class="sep">
      <div class="row"><b>できること:</b></div>
      <ul>
        <li>地面検出後にARオブジェクト配置</li>
      </ul>
      <button class="close-help" onclick="toggleHelp()">閉じる</button>
    </div>
  </div>

  <div id="ui-overlay">
    <div id="shape-picker">
      <button class="active" data-shape="box" onclick="selectShape('box')">
        <span class="icon">&#9632;</span>Box
      </button>
      <button data-shape="sphere" onclick="selectShape('sphere')">
        <span class="icon">&#9679;</span>Sphere
      </button>
      <button data-shape="cylinder" onclick="selectShape('cylinder')">
        <span class="icon">&#9644;</span>Cylinder
      </button>
      <button data-shape="cone" onclick="selectShape('cone')">
        <span class="icon">&#9650;</span>Cone
      </button>
    </div>
    <div id="actions">
      <button onclick="undoLast()">Undo</button>
      <button onclick="clearAll()">Clear All</button>
      <span class="counter">Objects: <span id="object-count">0</span></span>
    </div>
  </div>

  <a-scene
    tap-place-multi
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera
      id="camera"
      position="0 8 0"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-entity
      light="type: directional; intensity: 0.8; castShadow: true;
             shadowMapHeight: 2048; shadowMapWidth: 2048;
             shadowCameraTop: 20; shadowCameraBottom: -20;
             shadowCameraRight: 20; shadowCameraLeft: -20;
             target: #camera"
      xrextras-attach="target: camera; offset: 8 15 4"
      position="1 4.3 2.5"
      shadow>
    </a-entity>

    <a-light type="ambient" intensity="0.5"></a-light>

    <!-- 透明な地面 — タップでオブジェクト配置 -->
    <a-box
      id="ground"
      class="cantap"
      scale="1000 2 1000"
      position="0 -1 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow>
    </a-box>

  </a-scene>

  <script>
    // Unified error handling
    function showError(type) {
      var messages = {
        camera: { icon: '📷', title: 'カメラへのアクセスが必要です', message: 'ブラウザの設定からカメラのアクセスを許可してください。\n\nSettings > Safari/Chrome > Camera > Allow' },
        gps: { icon: '📍', title: '位置情報へのアクセスが必要です', message: 'このデモはGPS位置情報を使用します。\nブラウザの設定から位置情報のアクセスを許可してください。' },
        browser: { icon: '🌐', title: 'ブラウザが対応していません', message: 'このARデモはiOS Safari またはAndroid Chromeでご利用ください。\n\niOS: Safari最新版\nAndroid: Chrome最新版' },
        https: { icon: '🔒', title: 'HTTPSが必要です', message: 'このデモはHTTPS環境が必要です。\nhttps://xr-ar-lab.netlify.app からアクセスしてください。' }
      };
      var m = messages[type] || messages.browser;
      document.getElementById('error-icon').textContent = m.icon;
      document.getElementById('error-title').textContent = m.title;
      document.getElementById('error-message').textContent = m.message;
      document.getElementById('error-overlay').style.display = 'flex';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      showError('https');
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      showError('browser');
    }
  </script>

  <script>
  // Help overlay
  function toggleHelp() {
    document.getElementById('help-overlay').classList.toggle('visible');
  }
  // Auto-show after 1s, auto-hide after 5s or on first touch
  setTimeout(function() {
    document.getElementById('help-overlay').classList.add('visible');
    setTimeout(function() {
      document.getElementById('help-overlay').classList.remove('visible');
    }, 5000);
  }, 1000);
  document.addEventListener('touchstart', function _h() {
    document.getElementById('help-overlay').classList.remove('visible');
    document.removeEventListener('touchstart', _h);
  });
</script>
</body>
</html>
